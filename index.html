<meta name="theme-color" content="#0b0f1a">

<style>
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loadingBox{
  text-align:center;
}

.loadingLogo{
  width:220px;
  margin-bottom:20px;
  animation:logoFade 2s infinite;
}

@keyframes logoFade{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

.loadingBar{
  width:200px;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto 10px;
}

#loadingFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff4444);
  transition:0.2s;
}

.loadingText{
  font-size:14px;
  letter-spacing:2px;
}

body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
.screen{display:none;padding:10px;text-align:center}
.active{display:block}

.fire{border:3px solid #ff4444}
.water{border:3px solid #4488ff}
.thunder{border:3px solid #ffd700}
.wood{border:3px solid #44cc44}

.card{
display:inline-block;
background:#1a1f2e;
padding:6px;margin:5px;
border-radius:10px;width:95px;
}
.card img{width:100%;border-radius:8px}
.ssr{box-shadow:0 0 20px gold}

.rarity{
font-size:12px;
color:gold;
font-weight:bold;
margin-bottom:2px;
}

.flash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
animation:flash 0.6s;
}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

.flip{position:relative;width:90px;height:120px;transform-style:preserve-3d;transition:0.6s}
.open .flip{transform:rotateY(180deg)}
.front,.back{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;
}
.front{background:#444}
.back{transform:rotateY(180deg);background:#1a1f2e}

#battleMain{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
max-width:520px;
margin:auto;
}

.teamArea{
display:flex;
flex-direction:column;
gap:8px;
width:40%;
align-items:center;
}

#enemyArea{
width:55%;
display:flex;
justify-content:center;
}

.unit{
background:#1a1f2e;
padding:6px;
border-radius:12px;
font-size:10px;
position:relative;
}

.ally{width:140px;}
.unit img{
width:100%;
max-height:90px;
object-fit:cover;
border-radius:8px;
}

.enemy{width:160px;}

.turn{
outline:2px solid yellow;
box-shadow:0 0 6px yellow;
}

.bar{background:#333;height:8px;border-radius:5px;margin-top:3px;}
.hp{background:#4caf50;height:8px;}
.gauge{background:#ff9800;height:6px;}

.damage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:28px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #000,0 0 5px #000;
animation:damagePop 0.9s forwards;
pointer-events:none;
}

@keyframes damagePop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-100%) scale(0.8);}
}

.weak{color:#ff4444}
.resist{color:#44aaff}
.rainbowFlash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple);
opacity:0.8;
animation:rainbow 0.8s forwards;
z-index:999;
}

@keyframes rainbow{
0%{opacity:1;}
100%{opacity:0;}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

.ultra{
box-shadow:0 0 25px cyan,0 0 40px magenta;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

.eventFlash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffff);
opacity:0.8;
animation:eventFlash 0.8s forwards;
z-index:999;
}

@keyframes eventFlash{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(1.2);}
}

.banner{
animation:bannerGlow 1.5s infinite alternate;
}
@keyframes bannerGlow{
from{filter:brightness(1);}
to{filter:brightness(1.3);}
}

#gameTitle{

  height: auto;   /* 縦横比維持 */

.status{
font-size:12px;

#loading{

  height:100%;

  justify-content:center;
  align-items:center;

.loadingText{

  color:#fff;

}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

.hitText{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
color:#ffcc00;
text-shadow:0 0 8px #000;
animation:hitPop 0.8s forwards;
}

.totalDamage{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
color:#ff4444;

@keyframes hitPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-30px) scale(1);}
}

@keyframes totalPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.3);}
100%{opacity:0;transform:translate(-50%,-40px) scale(1);}
}

</style>

<script>
function applyTeamBuff(players){

let buff = getTeamBuff(players); // ←これ追加

return players.map(p=>{
    return {
        ...p,
        atk: Math.floor(p.atk * (1 + buff.atk / 100)),
        hp: Math.floor(p.hp * (1 + buff.hp / 100)),
        currentHp: Math.floor(p.hp * (1 + buff.hp / 100)),
        ult: 0,
        cool: 0
    };
});
}

function saveData(){
const data = {
stone,
box,
team,
progress,
dupeStone,
eventProgress // ←追加
};
localStorage.setItem("gachaData", JSON.stringify(data));
}

function loadData(){
const data = JSON.parse(localStorage.getItem("gachaData"));

stone = data.stone ?? 100;
box = data.box ?? [];
team = data.team ?? [];
progress = data.progress ?? {};
dupeStone = data.dupeStone ?? 0;
eventProgress = data.eventProgress ?? {};

}

function getGachaChar(){

let pool = chars.filter(c=>c.rarity==rarity);

return pool[Math.random()*pool.length|0];
}

function calcDamage(a,d,base){
if(advantage[a]===d)return {dmg:base*1.5,type:"weak"};
if(advantage[d]===a)return {dmg:base*0.5,type:"resist"};
return {dmg:base,type:""};
}

if(res.type==="ultimate") color="#ff00ff";

}

function attack(){
let p=players[turnIndex];

let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

let res = calcDamage(p.attr,enemy.attr,atk);
enemy.hp -= res.dmg;

renderBattle();

setTimeout(()=>{
    showDamage("enemy",res);
},10);

// 🔥 ここ変更
if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

p.ult+=30;
endTurn();
}

function ultimate(){
let p = players[turnIndex];
if(p.ult < 100) return;

let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

let res = calcDamage(p.attr, enemy.attr, atk * 3);
enemy.hp -= res.dmg;

p.ult = 0;

let flash=document.createElement("div");
flash.className="rainbowFlash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

renderBattle();

setTimeout(()=>{
    showDamage("enemy", {
        dmg: res.dmg,
        type: "ultimate"
    });
},10);

// 🔥 ここ変更
if(enemy.hp <= 0){
    setTimeout(()=>win(), 600);
    return;
}

endTurn();
}


function enemyTurn(){

let target = players[Math.floor(Math.random() * players.length)];
let index = players.indexOf(target); // ←固定（超重要）

let res = calcDamage(enemy.attr, target.attr, enemy.atk);

if(target.shield && target.shield.turn > 0){
    res.dmg *= (1 - target.shield.power);
}

target.currentHp -= res.dmg;

// 🔥 先に描画
renderBattle();

// 🔥 ダメージ表示（1回だけ）
setTimeout(()=>{
    showDamage("p" + index, res);
}, 50);

// 💀 敵の毒
if(enemy.poison && enemy.poison.turn > 0){

    let dmg = enemy.poison.user.atk * enemy.poison.power;

    enemy.hp -= dmg;
    enemy.poison.turn--;

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "poison"
        });
    },10);

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}
}

// 反撃
let delay = 0;

players.forEach(t=>{
    if(t.counter && t.counter.turn > 0){
        let res2 = calcDamage(t.attr, enemy.attr, t.atk * t.counter.power);
        enemy.hp -= res2.dmg;

        setTimeout(()=>{
            showDamage("enemy", {...res2, type:"weak"});
        }, delay);

        delay += 150;
        t.counter.turn--;

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}
    }
});

// 🔥 💥ここが核心：死亡処理を遅らせる
setTimeout(()=>{

    players = players.filter(p=>p.currentHp > 0);

    if(players.length === 0){
        alert("敗北");

        if(currentEvent !== undefined){
            currentEvent = undefined;
            go("event");
        }else{
            go("trial");
        }
        return;
    }

    // シールド減少
    players.forEach(p=>{
        if(p.shield && p.shield.turn > 0){
            p.shield.turn--;
        }
    });

    turn = "player";
    turnIndex = 0;
    renderBattle();

}, 500); // ←表示時間に合わせる
}

function endTurn(){
let p = players[turnIndex];

players.forEach(p=>{
    if(p.buff && p.buff.turn > 0){
        p.buff.turn--;
        if(p.buff.turn === 0){
            p.atk /= p.buff.power; // 元に戻す🔥
        }
    }
});

if(p.cool > 0) p.cool--;

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

turnIndex++;
if(turnIndex>=players.length){
turn="enemy";
setTimeout(enemyTurn,700);
turnIndex=0;
}
renderBattle();
}

function win(){

    // ⭐ イベント中ならイベント処理
    if(currentEvent !== undefined){
        Eventwin();
        return;
    }

    // ⭐ 通常の試練
    stone+=50;
    let id=chars.findIndex(c=>c.name===enemy.name);
    progress[id]=(progress[id]||1)+1;
    saveData();
    alert("勝利！石+50");
    go("trial");
}

localStorage.removeItem("gachaData");
location.reload();

function getTeamBuff(team){
let atkBuff = 0;
let hpBuff = 0;

team.forEach(c=>{
    if(c.rarity === 4){
        atkBuff += 0.30;
        hpBuff += 0.30;
    }else if(c.rarity === 3){
        atkBuff += 0.15;
        hpBuff += 0.15;
    }
});

// 必要なら上限
// atkBuff = Math.min(atkBuff, 0.5);
// hpBuff = Math.min(hpBuff, 0.5);

return {
    atk: Math.floor(atkBuff * 100),
    hp: Math.floor(hpBuff * 100)
};
}

function skill(){
let p = players[turnIndex];

if(!p.skill || !p.skill.type) return;
if(p.cool > 0) return;

let s = p.skill;

// バフ込みATK
let atk = p.atk;
if(p.buff && p.buff.turn > 0){
    atk *= p.buff.power;
}

// 🔥 単発ダメージ
if(s.type==="damage"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;

    renderBattle();
    setTimeout(()=>showDamage("enemy", res),10);
}

// 🔥 多段（←ここが一番重要）
if(s.type==="multi"){

    for(let i=0;i<s.hits;i++){

        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;

        // 🔻ヒットごとにデバフ
        if(!enemy.debuffUsed){
            enemy.atk *= 0.95; // ←ここ調整ポイント
        }

        setTimeout(()=>{
            showDamage("enemy", res);

            if(i === s.hits - 1){
                enemy.debuffUsed = true; // 最後に固定
                renderBattle();
            }

        }, i * 120);
    }
}

// 💚 回復
if(s.type==="heal"){
players.forEach((t,i)=>{
    let heal = t.hp * s.power;

    t.currentHp += heal;
    if(t.currentHp > t.hp) t.currentHp = t.hp;

    setTimeout(()=>{
        showDamage("p"+i, {
            dmg: heal,
            type: "heal"
        });
    },10);
});

renderBattle();
}

// 🔺 バフ
if(s.type==="buff"){
    p.atk *= s.power;
}

// 🔻 デバフ
if(s.type==="debuff"){
    if(currentEvent !== undefined){
        s.power = 1 - (1 - s.power) * 0.5;
    }

    if(enemy.debuffUsed){
        alert("これ以上弱体化できない！");
    }else{
        enemy.atk *= s.power;
        enemy.debuffUsed = true;
    }
}

// ☠ 毒
if(s.type==="poison"){
    enemy.poison = {
        turn: 3,
        power: s.power,
        user: p
    };
}

// 👥 全体バフ
if(s.type==="teamBuff"){
    players.forEach(t=>{
        t.buff = {
            turn: 3,
            power: s.power
        };
    });
}

// 🛡 カウンター
if(s.type==="counter"){
    p.counter = {
        turn: s.turn,
        power: s.power
    };
}

// 🔥 ドレイン
if(s.type==="drain"){
    let idx = turnIndex; // ←これ追加（超重要）

    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;

    let heal = res.dmg * 0.5;
    p.currentHp += heal;
    if(p.currentHp > p.hp) p.currentHp = p.hp;

    renderBattle();

    // ダメージ
    setTimeout(()=>{
        showDamage("enemy", res);
    },10);

    // 回復（ちゃんと自分に出る）
    setTimeout(()=>{
        showDamage("p"+idx, {
            dmg: heal,
            type: "heal"
        });
    },120);
}

// 💀 HPカット
if(s.type==="hpCut"){
    let dmg = enemy.maxHp * s.power;
    enemy.hp -= dmg;

    renderBattle();
    setTimeout(()=>showDamage("enemy",{dmg,type:""}),10);
}

// ⚡ 2回攻撃
if(s.type==="double"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    let res2 = calcDamage(p.attr, enemy.attr, atk * 0.5);

    enemy.hp -= res.dmg;
    enemy.hp -= res2.dmg;

    renderBattle();

    setTimeout(()=>showDamage("enemy", res),10);
    setTimeout(()=>showDamage("enemy", res2),160);
}

// 🛡 シールド
if(s.type==="shield"){
    p.shield = {
        turn: s.turn,
        power: s.power
    };
}

// CT
p.cool = s.cool || 2;

endTurn();
}

function startEventBattle(i){
go("battle");

let e = eventStages[i];
let prog = eventProgress[i] || 1;

// ステージ取得
let stage = e.stages[prog-1];

// 味方
players = applyTeamBuff(team.map(c=>{
let base =
    chars.find(ch => ch.name === c.name) ||
    eventChars.find(ch => ch.name === c.name) ||
    eventChars2.find(ch => ch.name === c.name) ||
    eventChars3.find(ch => ch.name === c.name); // 🔥追加

    return {
        ...c,
        skill: base?.skill || c.skill
    };
}));

// 敵
enemy = {
    ...e.enemy,
    hp: stage.hp,
    maxHp: stage.hp,
    atk: stage.atk,
    poison:0,
    debuffUsed:false // ←追加
};

// ボス演出（任意）
if(stage.boss){
    alert("⚠️ボス出現！！");
}

turn="player";
turnIndex=0;

currentEvent = i;

renderBattle();
}

function Eventwin(){

if(currentEvent !== undefined){

    let prog = eventProgress[currentEvent] || 1;
    let e = eventStages[currentEvent];

    // 🔥 初回クリア判定
    if(!eventProgress["clear_"+currentEvent]){

        // ★毎回報酬 → 初回だけに変更
        stone += e.reward;

    }

    prog++;

    if(prog > e.stages.length){

        alert("🎉イベント完全制覇！");

        // 🔥 初回のみ
        if(!eventProgress["clear_"+currentEvent]){

            // ボス報酬
            stone += e.bossReward || 0;

            // キャラ報酬
            let rewardChar = e.rewardChar;
            if(rewardChar){
                addToBox(rewardChar);
                alert("新キャラGET！！「" + rewardChar.name + "」");
            }

            // クリアフラグ
            eventProgress["clear_"+currentEvent] = true;
        }

        prog = e.stages.length;

    }else{
        alert("ステージクリア！");
    }

    eventProgress[currentEvent] = prog;

    saveData();

    currentEvent = undefined;

    go("event");
    return;
}
}
