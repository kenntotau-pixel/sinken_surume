<style>
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loadingBox{
  text-align:center;
}

.loadingLogo{
  width:220px;
  margin-bottom:20px;
  animation:logoFade 2s infinite;
}

@keyframes logoFade{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

.loadingBar{
  width:200px;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto 10px;
}

#loadingFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff4444);
  transition:0.2s;
}

.loadingText{
  font-size:14px;
  letter-spacing:2px;
}

body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
.screen{display:none;padding:10px;text-align:center}
.active{display:block}

.fire{border:3px solid #ff4444}
.water{border:3px solid #4488ff}
.thunder{border:3px solid #ffd700}
.wood{border:3px solid #44cc44}
.light{border:3px solid #ffffff}
.dark{border:3px solid #aa00ff}

.card{
display:inline-block;
background:#1a1f2e;
padding:6px;margin:5px;
border-radius:10px;width:95px;
}
.card img{width:100%;border-radius:8px}
.ssr{box-shadow:0 0 20px gold}

.rarity{
font-size:12px;
color:gold;
font-weight:bold;
margin-bottom:2px;
}

.flash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
animation:flash 0.6s;
}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

.flip{position:relative;width:90px;height:120px;transform-style:preserve-3d;transition:0.6s}
.open .flip{transform:rotateY(180deg)}
.front,.back{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;
}
.front{background:#444}
.back{transform:rotateY(180deg);background:#1a1f2e}

#battleMain{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
max-width:520px;
margin:auto;
}

.teamArea{
display:flex;
flex-direction:column;
gap:8px;
width:40%;
align-items:center;
}

#enemyArea{
width:55%;
display:flex;
justify-content:center;
}

.unit{
background:#1a1f2e;
padding:6px;
border-radius:12px;
font-size:10px;
position:relative;
}

.ally{width:140px;}
.unit img{
width:100%;
max-height:90px;
object-fit:cover;
border-radius:8px;
}

.enemy{width:160px;}

.turn{
outline:2px solid yellow;
box-shadow:0 0 6px yellow;
}

.bar{background:#333;height:8px;border-radius:5px;margin-top:3px;}
.hp{background:#4caf50;height:8px;}
.gauge{background:#ff9800;height:6px;}

.damage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:28px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #000,0 0 5px #000;
animation:damagePop 0.9s forwards;
pointer-events:none;
}

@keyframes damagePop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-100%) scale(0.8);}
}

.weak{color:#ff4444}
.resist{color:#44aaff}
.rainbowFlash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple);
opacity:0.8;
animation:rainbow 0.8s forwards;
z-index:999;
}

@keyframes rainbow{
0%{opacity:1;}
100%{opacity:0;}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

.ultra{
box-shadow:0 0 25px cyan,0 0 40px magenta;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

.eventFlash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffff);
opacity:0.8;
animation:eventFlash 0.8s forwards;
z-index:999;
}

@keyframes eventFlash{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(1.2);}
}

.banner{
animation:bannerGlow 1.5s infinite alternate;
}
@keyframes bannerGlow{
from{filter:brightness(1);}
to{filter:brightness(1.3);}
}

#gameTitle{
  width: 350px;   /* 好きなサイズに変更 */
  height: auto;   /* 縦横比維持 */

.status{
font-size:12px;
margin:4px 0;
min-height:14px;
}


.loadingText{

  color:#fff;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

.hitText{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
color:#ffcc00;
text-shadow:0 0 8px #000;
animation:hitPop 0.8s forwards;
}

.totalDamage{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
color:#ff4444;
text-shadow:0 0 10px #000;
animation:totalPop 1s forwards;
}


@keyframes hitPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-30px) scale(1);}
}

@keyframes totalPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.3);}
100%{opacity:0;transform:translate(-50%,-40px) scale(1);}

.dexRow{

/* ===== Phase1追加: ロールバッジ ===== */

.ctWrap{display:flex;align-items:center;gap:3px;margin-top:2px;}

/* ===== Phase1追加: シナジー発動テキスト ===== */
.synergyText{
  position:fixed;
  top:50%;
  left:50%;

  font-weight:bold;
  color:#fff;
  text-shadow:0 0 20px #ff0088,0 0 10px #ff0088;

  pointer-events:none;
  z-index:9998;
  text-align:center;
  white-space:nowrap;
}
@keyframes synergyPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
  20%{opacity:1;transform:translate(-50%,-60%) scale(1.3);}

/* ===== Phase1追加: 状態異常ダメージ色 ===== */

.dmgSynergy{color:#ff00cc!important;font-size:36px!important;}

</style>

<script>
function applyTeamBuff(players){

let buff = getTeamBuff(players); // ←これ追加

return players.map(p=>{
    return {
        ...p,
        atk: Math.floor(p.atk * (1 + buff.atk / 100)),
        hp: Math.floor(p.hp * (1 + buff.hp / 100)),
        currentHp: Math.floor(p.hp * (1 + buff.hp / 100)),
        ult: 0,
        cool: 0,
        weaponCool: 0
    };
});
}

progress,
dupeStone,
eventProgress, // ←追加 // ←追加

localStorage.setItem("gachaData", JSON.stringify(data));

function star(r){return "★".repeat(r);}

function getGachaChar(){
let r = Math.random();
let rarity;

if(r < 0.70) rarity = 1;
else if(r < 0.90) rarity = 2;
else if(r < 0.99)rarity = 3;
else rarity =4;

// 🔥通常キャラだけ
let pool = chars.filter(c=>c.rarity==rarity);

return pool[Math.random()*pool.length|0];
}

}

function sortBox(type){
if(type==="atk")box.sort((a,b)=>b.atk-a.atk);
if(type==="hp")box.sort((a,b)=>b.hp-a.hp);
if(type==="rarity")box.sort((a,b)=>b.rarity-a.rarity);
if(type==="dupe")box.sort((a,b)=>b.dupe-a.dupe);
update();
}

function add(i){
if(team.find(t=>t.name===box[i].name))return;
if(team.length<3)team.push(box[i]);
update();
saveData(); 
}

function remove(i){
team.splice(i,1);
update();
}

${c.name}<br>Lv.${lv}

function startBattle(i){
go("battle");

let lv = progress[i] || 1;

  players = applyTeamBuff(team.map(c=>{
    let base =
        chars.find(ch => ch.name === c.name) ||
        eventChars.find(ch => ch.name === c.name) ||
        eventChars2.find(ch => ch.name === c.name) ||
        eventChars3.find(ch => ch.name === c.name) ||
        eventChars4.find(ch => ch.name === c.name) ||
        eventChars5.find(ch => ch.name === c.name) ||
        eventChars6.find(ch => ch.name === c.name) ||
        rewardChar.find(ch => ch.name === c.name);

    let weapon = c.weapon;

let finalAtk = c.atk + (weapon?.atk || 0);
let finalHp = c.hp + (weapon?.hp || 0);

return {
    ...c,
    atk: finalAtk,
    hp: finalHp,
    currentHp: finalHp,
    skill: base?.skill || c.skill,
    weapon: c.weapon ? {...c.weapon} : null,
    weaponCool: 0
};
  }));

// 敵はそのまま
  enemy={
      ...chars[i],
      hp: Math.floor(200+lv*120*lv/10),
      maxHp: Math.floor(200+lv*120*lv/10),
      atk: Math.floor(20+lv*50),
      poison:0,
      poisons:[],
      burnTurn:0, burnPower:0,
      burns:[], // 燃焼重ね掛け配列
      freezeTurn:0,
      shockTurn:0, shockPower:0,
      shield:0,
      debuffUsed:false,
      debuffPower: 1,
      debuffTurn: 0,
      debuffs:[], // デバフ重ね掛け配列
      gimmick: null,
      turnCount: 0
  };


turn="player";turnIndex=0;
deadPlayers=[];
players.forEach(p => p.weaponCool = 0);
renderBattle();
}

function calcDamage(a,d,base){
if(advantage[a]===d)return {dmg:base*1.5,type:"weak"};
if(advantage[d]===a)return {dmg:base*0.5,type:"resist"};
return {dmg:base,type:""};
}

    renderBattle();
    el=document.getElementById(id);

}

let div=document.createElement("div");
div.className="damage";

let color="#fff";

function getRoleLabel(role){
  const map={attacker:"⚔攻",tank:"🛡壁",support:"💚支",debuffer:"💜弱"};
  return map[role]||"⚔攻";
}
function getRoleClass(role){
  return "role-"+(role||"attacker");
}

function getPlayerStatusHTML(p){
  let h="";
  if(p.statuses){
    p.statuses.forEach(s=>{
      if(s.type==="burn") h+=`<span class="sBadge sBurn">🔥燃${s.turn}</span>`;
      else if(s.type==="freeze") h+=`<span class="sBadge sFreeze">❄凍${s.turn}</span>`;
      else if(s.type==="shock") h+=`<span class="sBadge sShock">⚡感${s.turn}</span>`;
      else if(s.type==="poison") h+=`<span class="sBadge sPoison">☠毒${s.turn}</span>`;
    });
  }
  // シールド（重複スタック対応）
  if(p.shields && p.shields.length>0){
    let totalTurn = Math.max(...p.shields.map(s=>s.turn));
    let totalPower = Math.min(1, p.shields.reduce((acc,s)=>acc+s.power, 0));
    h+=`<span class="sBadge sShield">🛡×${p.shields.length}(${Math.floor(totalPower*100)}%/${totalTurn}T)</span>`;
  } else if(p.shield && p.shield.turn>0) h+=`<span class="sBadge sShield">🛡${p.shield.turn}</span>`;
  if(p.taunt && p.taunt.turn>0) h+=`<span class="sBadge" style="background:#ff8800;color:#fff;">🎯挑発${p.taunt.turn}</span>`;
  // 反撃（重複スタック対応）
  if(p.counters && p.counters.length>0){
    let totalTurn = Math.max(...p.counters.map(c=>c.turn));
    h+=`<span class="sBadge sCounter">⚔反×${p.counters.length}(${totalTurn}T)</span>`;
  } else if(p.counter && p.counter.turn>0) h+=`<span class="sBadge sCounter">⚔反${p.counter.turn}</span>`;
  if(p.buffs && p.buffs.length>0) h+=`<span class="sBadge sBuff">↑バフ</span>`;
  return h;
}

function getEnemyStatusHTML(){
  let h="";
  if(enemy.poisons && enemy.poisons.length>0) h+=`<span class="sBadge sPoison">☠毒×${enemy.poisons.length}</span>`;
  if(enemy.burns && enemy.burns.length>0) h+=`<span class="sBadge sBurn">🔥燃${enemy.burns.length}重(${enemy.burnTurn}T)</span>`;
  else if(enemy.burnTurn>0) h+=`<span class="sBadge sBurn">🔥燃${enemy.burnTurn}</span>`;
  if(enemy.freezeTurn>0) h+=`<span class="sBadge sFreeze">❄凍${enemy.freezeTurn}</span>`;
  if(enemy.shockTurn>0) h+=`<span class="sBadge sShock">⚡感${enemy.shockTurn}</span>`;
  if(enemy.debuffs && enemy.debuffs.length>0) h+=`<span class="sBadge sDebuff">↓弱体${enemy.debuffs.length}重(${enemy.debuffTurn}T)</span>`;
  else if(enemy.debuffTurn>0) h+=`<span class="sBadge sDebuff">↓弱体${enemy.debuffTurn}</span>`;
  if(enemy.allDebuffMark && enemy.allDebuffTurn>0) h+=`<span class="sBadge" style="background:#ff00cc;color:#fff;">💢被ダメ↑(${enemy.allDebuffTurn}T)</span>`;
  if(enemy.shield>0) h+=`<span class="sBadge sShield">🛡${Math.floor(enemy.shield)}</span>`;
  return h;
}

function getGimmickHTML(){
  if(!enemy.gimmick) return "";
  let g=enemy.gimmick;
  let h=`<div class="gimmickRow">`;
  if(g.shieldLabel) h+=`<span class="gBadge">${g.shieldLabel}</span>`;
  if(g.attrOnlyLabel) h+=`<span class="gBadge">${g.attrOnlyLabel}</span>`;
  if(g.turnLimitLabel){
    let rem=g.turnLimit-(enemy.turnCount||0);
    h+=`<span class="gBadge" style="color:${rem<=3?"#ff4444":"#ffd700"}">⏱残${rem}T</span>`;
  }
  if(g.turnBuffLabel) h+=`<span class="gBadge">${g.turnBuffLabel}</span>`;
  if(g.counterLabel) h+=`<span class="gBadge">${g.counterLabel}</span>`;
  if(g.phaseRageLabel) h+=`<span class="gBadge" style="color:${enemy.phaseRaged?"#ff4444":"#ffd700"}">${enemy.phaseRaged?"💀狂化中！":g.phaseRageLabel}</span>`;
  h+=`</div>`;
  return h;
}

function renderBattle(){
  let teamArea = document.getElementById("teamArea");
  let enemyArea = document.getElementById("enemyArea");

  teamArea.innerHTML = players.map((p,i)=>{
    let hpPct = Math.max(0,(p.currentHp/p.hp)*100);
    let coolPct = p.cool>0 ? Math.max(0,100-p.cool*(100/(p.skill?.cool||3))) : 100;
    let isReady = p.cool<=0;
    return `
  <div class="unit ally ${attrClass[p.attr]} ${i===turnIndex ? "turn" : ""}" id="p${i}">
    <img src="${p.img}">
    <span class="roleBadge ${getRoleClass(p.role)}">${getRoleLabel(p.role)}</span>
    ${p.name}
    <div class="statusRow">${getPlayerStatusHTML(p)}</div>
    <div>HP:${Math.floor(p.currentHp)}</div>
    <div class="bar"><div class="hp" style="width:${hpPct}%"></div></div>
    <div class="ctWrap">
      <span class="ctLabel">CT</span>
      <div class="ctBar"><div class="${isReady?"ctFillReady":"ctFill"}" style="width:${isReady?100:coolPct}%"></div></div>
    </div>
    <div class="bar"><div class="gauge" style="width:${p.ult}%"></div></div>
  </div>`;
  }).join("")
  + (deadPlayers.length > 0 ? deadPlayers.map(p=>`
  <div class="unit ally" style="opacity:0.4;filter:grayscale(1);border:2px dashed #ff4444;">
    <img src="${p.img}">
    ${p.name}
    <div style="color:#ff4444;font-weight:bold;">💀 戦闘不能</div>
  </div>`).join("") : "");

  let hpPct2 = Math.max(0,(enemy.hp/enemy.maxHp)*100);
  enemyArea.innerHTML = `
<div class="unit enemy ${attrClass[enemy.attr]} ${turn==="enemy"?"turn":""}" id="enemy">
  <img src="${enemy.img}">
  ${enemy.name}
  <div class="statusRow">${getEnemyStatusHTML()}</div>
  ${getGimmickHTML()}
  <div>HP:${Math.floor(enemy.hp)}</div>
  <div class="bar"><div class="hp" style="width:${hpPct2}%"></div></div>
</div>`;

  let p = players[turnIndex];
  actions.innerHTML =
    turn==="player"
    ? `<button onclick="attack()">攻撃</button>
       <button onclick="skill()" ${p.cool>0?"disabled":""}>
       スキル (CT:${p.cool})
       </button>
${p.weapon ? `<button onclick="weaponSkill()" ${(p.weaponCool??0)>0?"disabled":""}>スキル2 (CT:${p.weaponCool})</button>` : ""}
       <button onclick="ultimate()">必殺</button>`
    : "敵のターン";
}

function attack(){
let p=players[turnIndex];

let atk = p.atk;
if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

let res = calcDamage(p.attr,enemy.attr,atk);

// allDebuffMark: 被ダメ1.5倍（ターン制・感電と重複）
if(enemy.allDebuffMark){
    res.dmg = Math.floor(res.dmg * 1.5);
    // ※フラグはallDebuffTurnで管理するためここではリセットしない
}

// ギミック: 属性制限（狂化後は全属性有効）
if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly){
  if(enemy.shield>0){
    // シールドには当てられる
  } else {
    res.dmg = Math.floor(res.dmg * 0.05);
  }
}

// シールド処理
if(enemy.shield>0){
  let absorbed=Math.min(enemy.shield, res.dmg);
  enemy.shield -= absorbed;
  res.dmg -= absorbed;
}

enemy.hp -= res.dmg;
applyShockBonus(p, atk);

renderBattle();

setTimeout(()=>{
    showDamage("enemy",res);
},10);

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

p.ult+=30;
endTurn();
}

function ultimate(){
let p = players[turnIndex];
if(p.ult < 100) return;

let atk = p.atk;

if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

let res = calcDamage(p.attr, enemy.attr, atk * 3);
if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly && enemy.shield<=0) res.dmg=Math.floor(res.dmg*0.05);
if(enemy.shield>0){ let ab=Math.min(enemy.shield,res.dmg); enemy.shield-=ab; res.dmg-=ab; }
enemy.hp -= res.dmg;
applyShockBonus(p, atk);

p.ult = 0;

let flash=document.createElement("div");
flash.className="rainbowFlash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

renderBattle();

setTimeout(()=>{
    showDamage("enemy", {
        dmg: res.dmg,
        type: "ultimate"
    });
},10);

// 🔥 ここ変更
if(enemy.hp <= 0){
    setTimeout(()=>win(), 600);
    return;
}

endTurn();
}


function showSynergyText(text){
  let div=document.createElement("div");
  div.className="synergyText";
  div.textContent=text;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1400);
}

function checkSynergy(p, atk){
  // 毒 + 燃焼 → 爆発ダメージ
  if(enemy.poisons && enemy.poisons.length>0 && enemy.burnTurn>0){
    let expDmg = atk * 3;
    enemy.hp -= expDmg;
    enemy.poisons = [];
    enemy.burnTurn = 0;
    setTimeout(()=>{
      showSynergyText("💥 毒×炎 シナジー！爆発！");
      showDamage("enemy",{dmg:expDmg, type:"synergy"});
    },200);
    return;
  }
  // 感電 + 毒 → 毒ダメ即時爆発
  if(enemy.shockTurn>0 && enemy.poisons && enemy.poisons.length>0){
    let bonusDmg = enemy.poisons.reduce((s,po)=>s+p.atk*po.power,0)*2;
    enemy.hp -= bonusDmg;
    enemy.shockTurn = 0;
    setTimeout(()=>{
      showSynergyText("⚡ 感電×毒 シナジー！毒爆発！");
      showDamage("enemy",{dmg:bonusDmg, type:"synergy"});
    },200);
  }
}

function applyShockBonus(p, atk){
  if(enemy.shockTurn>0){
    let bonusDmg = atk * 0.5;
    // allDebuffMarkがある場合、感電ボーナスにも被ダメ1.5倍を重複適用
    if(enemy.allDebuffMark){
      bonusDmg = Math.floor(bonusDmg * 1.5);
    }
    enemy.hp -= bonusDmg;
    enemy.shockTurn--;
    setTimeout(()=>showDamage("enemy",{dmg:bonusDmg,type:"shock"}),150);
  }
}

function enemyTurn(){

// ギミック: 凍結で行動不能
if(enemy.freezeTurn>0){
  enemy.freezeTurn--;
  showSynergyText("❄ 凍結中！敵の行動をスキップ！");
  setTimeout(()=>{
    applyEnemyStatusDamage(()=>{
      turn="player"; turnIndex=0;
      enemy.turnCount=(enemy.turnCount||0)+1;
      checkTurnLimit();
      renderBattle();
    });
  },600);
  return;
}

let target = players[Math.floor(Math.random() * players.length)];

// 挑発中のキャラがいれば強制的にそちらを狙う
let tauntTarget = players.find(p=>p.taunt && p.taunt.turn>0);
if(tauntTarget) target = tauntTarget;

let index = players.indexOf(target);
let atk = enemy.atk * enemy.debuffPower;

// ギミック: HP50%以下で狂化（phaseRage）→ ATK1.5倍・属性制限解除
if(enemy.gimmick?.phaseRage && enemy.hp <= enemy.maxHp * 0.5 && !enemy.phaseRaged){
    enemy.phaseRaged = true;
    enemy.atk = Math.floor(enemy.atk * 1.5);
    atk = enemy.atk * enemy.debuffPower;
    showSynergyText("💀 ボス狂化！ATK1.5倍！");
}

// ギミック: ターン毎ATKバフ（上限+80%・基礎ATKから加算で計算）
if(enemy.gimmick?.turnBuff){
  enemy.turnBuffStacks = Math.min((enemy.turnBuffStacks||0) + 1, 10);
  let buffRate = 1 + enemy.turnBuffStacks * 0.08;
  atk = enemy.baseAtk * buffRate * enemy.debuffPower;
}

// ギミック: カウンター持ち（受けたら反撃）
if(enemy.gimmick?.counter){
  // プレイヤーへの攻撃後に追加攻撃
}

let res = calcDamage(enemy.attr, target.attr, atk);

// シールド（重複スタック対応）: 全スタックのpowerを合算（上限100%）して軽減
if(target.shields && target.shields.length > 0){
    let totalPower = Math.min(1, target.shields.reduce((acc,s)=>acc+s.power, 0));
    res.dmg *= (1 - totalPower);
} else if(target.shield && target.shield.turn > 0){
    res.dmg *= (1 - target.shield.power);
}

target.currentHp -= res.dmg;
if(target.currentHp <= 0) target.currentHp = 0;

renderBattle();
setTimeout(()=>{ showDamage("p" + index, res); }, 50);

// ギミック: カウンター反撃
if(enemy.gimmick?.counter){
  let cDmg = atk * 0.3;
  enemy.hp -= cDmg;
  setTimeout(()=>{
    showSynergyText("🔄 カウンター発動！");
    showDamage("enemy",{dmg:cDmg,type:"weak"});
  },300);
}

setTimeout(()=>{
  applyEnemyStatusDamage(()=>{
    if(turn === "enemy"){
      // デバフスタックターン減少
      if(enemy.debuffs && enemy.debuffs.length > 0){
          enemy.debuffs = enemy.debuffs.filter(d=>{ d.turn--; return d.turn>0; });
          enemy.debuffPower = enemy.debuffs.length > 0 ? enemy.debuffs.reduce((acc,d)=>acc*d.power,1) : 1;
          enemy.debuffTurn = enemy.debuffs.length > 0 ? Math.max(...enemy.debuffs.map(d=>d.turn)) : 0;
      } else {
          if(enemy.debuffTurn > 0) enemy.debuffTurn--;
          if(enemy.debuffTurn <= 0) enemy.debuffPower = 1;
      }
    }

    // HP0キャラをdeadPlayersへ移動
    let fallen = players.filter(p => p.currentHp <= 0);
    fallen.forEach(p => { if(!deadPlayers.find(d=>d.name===p.name)) deadPlayers.push(p); });
    players = players.filter(p => p.currentHp > 0);
    if(players.length === 0){
      alert("敗北");
      if(currentEvent !== undefined){ currentEvent=undefined; go("event"); }
      else go("trial");
      return;
    }

    players.forEach(p=>{
      // シールド配列のターン減少
      if(p.shields && p.shields.length>0){
        p.shields = p.shields.filter(s=>{ s.turn--; return s.turn>0; });
      }
      if(p.shield && p.shield.turn>0) p.shield.turn--;
    });

    // allDebuffMarkのターン管理
    if(enemy.allDebuffMark && enemy.allDebuffTurn !== undefined){
      enemy.allDebuffTurn--;
      if(enemy.allDebuffTurn <= 0){ enemy.allDebuffMark = false; enemy.allDebuffTurn = 0; }
    }

    turn = "player";
    turnIndex = 0;
    if(turnIndex >= players.length) turnIndex = 0;
    enemy.turnCount=(enemy.turnCount||0)+1;
    checkTurnLimit();
    renderBattle();
  });
}, 500);
}

function applyEnemyStatusDamage(callback){
  let delay = 0;

  // 毒（重ね掛け）
  if(enemy.poisons && enemy.poisons.length>0){
    enemy.poisons = enemy.poisons.filter(poison=>{
      let atk2 = poison.user.atk;
      if(poison.user.buffs) poison.user.buffs.forEach(b=>{ atk2*=b.power; });
      let dmg = atk2 * poison.power;
      enemy.hp -= dmg;
      setTimeout(()=>showDamage("enemy",{dmg,type:"poison"}), delay);
      delay+=100;
      poison.turn--;
      return poison.turn>0;
    });
  }

  // 燃焼（重ね掛け対応）
  if(enemy.burns && enemy.burns.length > 0){
    enemy.burns = enemy.burns.filter(b => {
        enemy.hp -= b.power;
        setTimeout(()=>showDamage("enemy",{dmg:b.power,type:"burn"}), delay);
        delay += 80;
        b.turn--;
        return b.turn > 0;
    });
    enemy.burnPower = enemy.burns.reduce((acc, b) => acc + b.power, 0);
    enemy.burnTurn = enemy.burns.length > 0 ? Math.max(...enemy.burns.map(b=>b.turn)) : 0;
  } else if(enemy.burnTurn > 0){
    let bDmg = enemy.burnPower;
    enemy.hp -= bDmg;
    setTimeout(()=>showDamage("enemy",{dmg:bDmg,type:"burn"}), delay);
    delay+=100;
    enemy.burnTurn--;
  }

  setTimeout(()=>{
    // 反撃（重複スタック対応）
    players.forEach(t=>{
      // 新配列スタック方式
      if(t.counters && t.counters.length>0){
        t.counters.forEach(ct=>{
          let res2=calcDamage(t.attr,enemy.attr,t.atk*ct.power);
          enemy.hp-=res2.dmg;
          setTimeout(()=>showDamage("enemy",{...res2,type:"weak"}),50);
        });
        t.counters = t.counters.filter(ct=>{ ct.turn--; return ct.turn>0; });
      }
      // 旧方式（後方互換）
      else if(t.counter && t.counter.turn>0){
        let res2=calcDamage(t.attr,enemy.attr,t.atk*t.counter.power);
        enemy.hp-=res2.dmg;
        setTimeout(()=>showDamage("enemy",{...res2,type:"weak"}),50);
        t.counter.turn--;
      }
    });
    if(enemy.hp<=0){ setTimeout(()=>win(),500); return; }
    if(callback) callback();
  }, delay+100);
}

function checkTurnLimit(){
  if(!enemy.gimmick?.turnLimit) return;
  let rem = enemy.gimmick.turnLimit - (enemy.turnCount||0);
  if(rem<=0 && enemy.hp>0){
    alert("⏱ ターン制限超過！敗北...");
    if(currentEvent!==undefined){ currentEvent=undefined; go("event"); }
    else go("trial");
  }
}

function endTurn(){
if(turn === "enemy"){

    // デバフスタックのターン減少
    if(enemy.debuffs && enemy.debuffs.length > 0){
        enemy.debuffs = enemy.debuffs.filter(d=>{ d.turn--; return d.turn>0; });
        if(enemy.debuffs.length > 0){
            enemy.debuffPower = enemy.debuffs.reduce((acc,d)=>acc*d.power, 1);
            enemy.debuffTurn = Math.max(...enemy.debuffs.map(d=>d.turn));
        } else {
            enemy.debuffPower = 1;
            enemy.debuffTurn = 0;
        }
    } else if(enemy.debuffTurn > 0){
        enemy.debuffTurn--;
        if(enemy.debuffTurn <= 0) enemy.debuffPower = 1;
    }
}

let p = players[turnIndex];

if(p.buffs){
    p.buffs = p.buffs.filter(b=>{
        b.turn--;
        return b.turn > 0;
    });
}

if(p.cool > 0) p.cool--;
if(p.weaponCool > 0) p.weaponCool--;
if(p.taunt && p.taunt.turn > 0){ p.taunt.turn--; if(p.taunt.turn<=0) p.taunt=null; }

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

turnIndex++;
if(turnIndex>=players.length){
turn="enemy";
setTimeout(enemyTurn,700);
turnIndex=0;
}
renderBattle();
}

function win(){

    // ⭐ イベント中ならイベント処理
    if(currentEvent !== undefined){
        Eventwin();
        return;
    }

    // ⭐ 通常の試練
    stone+=10;
    let id=chars.findIndex(c=>c.name===enemy.name);
    progress[id]=(progress[id]||1)+1;
    saveData();
    alert("勝利！石+10");
    go("trial");
}

localStorage.removeItem("gachaData");
location.reload();
}

function getTeamBuff(team){
let atkBuff = 0;
let hpBuff = 0;

team.forEach(c=>{
    if(c.rarity === 4){
        atkBuff += 0.30;
        hpBuff += 0.30;
    }else if(c.rarity === 3){
        atkBuff += 0.15;
        hpBuff += 0.15;
    }
});

// 必要なら上限
// atkBuff = Math.min(atkBuff, 0.5);
// hpBuff = Math.min(hpBuff, 0.5);



return {
    atk: Math.floor(atkBuff * 100),
    hp: Math.floor(hpBuff * 100)
};
}

function skill(){
let p = players[turnIndex];

if(!p.skill || !p.skill.type) return;
if(p.cool > 0) return;

let s = p.skill;

// バフ込みATK
let atk = p.atk;

if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

// 🔥 単発ダメージ
if(s.type==="damage"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly && enemy.shield<=0) res.dmg=Math.floor(res.dmg*0.05);
    if(enemy.shield>0){ let ab=Math.min(enemy.shield,res.dmg); enemy.shield-=ab; res.dmg-=ab; }
    // allDebuffMarkによる被ダメ1.5倍（ターン持続）
    if(enemy.allDebuffMark) res.dmg = Math.floor(res.dmg * 1.5);
    enemy.hp -= res.dmg;
    applyShockBonus(p, atk);
    renderBattle();
    setTimeout(()=>showDamage("enemy", res),10);
  showSynergyText("超ダメージ！");
}

// 🔥 多段（←ここが一番重要）
if(s.type==="multi"){

    for(let i=0;i<s.hits;i++){
  showSynergyText("多段攻撃！");
        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;

        // 🔻ヒットごとにデバフ
        if(!enemy.debuffUsed){
            enemy.atk *= 0.95; // ←ここ調整ポイント
        }

        setTimeout(()=>{
            showDamage("enemy", res);

            if(i === s.hits - 1){
                enemy.debuffUsed = true; // 最後に固定
                renderBattle();
            }

        }, i * 120);
    }
}

// 💚 回復
if(s.type==="heal"){
players.forEach((t,i)=>{
    let heal = t.hp * s.power;
  showSynergyText("回復！");
    t.currentHp += heal;
    if(t.currentHp > t.hp) t.currentHp = t.hp;

    setTimeout(()=>{
        showDamage("p"+i, {
            dmg: heal,
            type: "heal"
        });
    },10);
});

renderBattle();
}

// 🔺 バフ
if(s.type==="buff"){
    p.atk *= s.power;
  showSynergyText("バフ付与！");
}

// 🔻 デバフ（重ね掛け対応）
if(s.type==="debuff"){
    if(!enemy.debuffs) enemy.debuffs = [];
    let power = s.power;
    if(currentEvent !== undefined){
        power = 1 - (1 - power) * 0.5;
    }
    enemy.debuffs.push({ power: power, turn: 3 });
    // 全デバフを合成してdebuffPowerを更新
    enemy.debuffPower = enemy.debuffs.reduce((acc, d) => acc * d.power, 1);
    enemy.debuffTurn = Math.max(...enemy.debuffs.map(d=>d.turn));
    showSynergyText("デバフ付与！(×" + enemy.debuffs.length + "重)");
}

// ☠ 毒（重ね掛け対応）
if(s.type==="poison"){
if(!enemy.poisons) enemy.poisons = [];
  showSynergyText("毒付与！");
enemy.poisons.push({
    power: s.power,
    turn: 10,
    user: p
});

// シナジー判定: 毒+炎 → 爆発
checkSynergy(p, atk);
}

// 🔥 燃焼（重ね掛け対応）
if(s.type==="burn"){
    if(!enemy.burns) enemy.burns = [];
    enemy.burns.push({ power: atk * s.power, turn: s.turn || 4, user: p });
    // 合計値をburnPower/burnTurnに反映
    enemy.burnPower = enemy.burns.reduce((acc, b) => acc + b.power, 0);
    enemy.burnTurn = Math.max(...enemy.burns.map(b => b.turn));
    showSynergyText("燃焼付与！(×" + enemy.burns.length + "重)");
    // シナジー判定
    checkSynergy(p, atk);
}

// ❄ 凍結
if(s.type==="freeze"){
  enemy.freezeTurn = 1;
  showSynergyText("凍結！行動不能！");
}

// ⚡ 感電
if(s.type==="shock"){
  enemy.shockTurn = 2;
  enemy.shockPower = atk * s.power;
  showSynergyText("感電付与！");
  // シナジー判定
  checkSynergy(p, atk);
}

// 👥 全体バフ
if(s.type==="teamBuff"){
    players.forEach(t=>{
  showSynergyText("全体バフ！");
        if(!t.buffs) t.buffs = [];

        t.buffs.push({
            turn: 3,
            power: s.power
        });
    });
}

// 🛡 カウンター（重複スタック対応）
if(s.type==="counter"){
    if(!p.counters) p.counters = [];
    p.counters.push({ turn: s.turn, power: s.power });
  showSynergyText("カウンター付与！(×" + p.counters.length + "重)");
}

// 💖 瀕死の一撃
if(s.type === "rage"){
    let ratio = 1 - (p.currentHp / p.hp); // 減ってるほど強い
    let dmg = Math.floor(atk * (1 + ratio * (s.power - 1) * 3));
  showSynergyText("狂化発動！");
    enemy.hp -= dmg;

    renderBattle();

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "ultimate"
        });
    },10);
}
// 🔥 ドレイン
if(s.type==="drain"){
    let idx = turnIndex; // ←これ追加（超重要）

    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    if(enemy.allDebuffMark) res.dmg = Math.floor(res.dmg * 1.5);
    enemy.hp -= res.dmg;

    let heal = res.dmg * 0.5;
    p.currentHp += heal;
    if(p.currentHp > p.hp) p.currentHp = p.hp;
  showSynergyText("吸収！");
    renderBattle();

    // ダメージ
    setTimeout(()=>{
        showDamage("enemy", res);
    },10);

    // 回復（ちゃんと自分に出る）
    setTimeout(()=>{
        showDamage("p"+idx, {
            dmg: heal,
            type: "heal"
        });
    },120);
}

// 💀 HPカット
if(s.type==="hpCut"){
    let dmg = enemy.maxHp * s.power;
    enemy.hp -= dmg;
  showSynergyText("HPカット！");
    renderBattle();
    setTimeout(()=>showDamage("enemy",{dmg,type:""}),10);
}

// ⚡ 2回攻撃
if(s.type==="double"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    let res2 = calcDamage(p.attr, enemy.attr, atk * 0.5);
  showSynergyText("連撃！");
    enemy.hp -= res.dmg;
    enemy.hp -= res2.dmg;

    renderBattle();

    setTimeout(()=>showDamage("enemy", res),10);
    setTimeout(()=>showDamage("enemy", res2),160);
}

// 🛡 シールド（重複スタック対応）
if(s.type==="shield"){
    if(!p.shields) p.shields = [];
    p.shields.push({ turn: s.turn, power: s.power });
    showSynergyText("シールド付与！(×" + p.shields.length + "重)");
}

// 💥 連鎖爆発: ダメージ + 味方全員CT即時リセット
if(s.type==="chain"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly && enemy.shield<=0) res.dmg=Math.floor(res.dmg*0.05);
    if(enemy.shield>0){ let ab=Math.min(enemy.shield,res.dmg); enemy.shield-=ab; res.dmg-=ab; }
    enemy.hp -= res.dmg;
    players.forEach(t=>{ t.cool = 0; });
    applyShockBonus(p, atk);
    renderBattle();
    setTimeout(()=>{
        showDamage("enemy", res);
        showSynergyText("💥 連鎖爆発！味方CT全回復！");
    },10);
}

// ⬆ 蘇生: 死亡済みの味方1人をHP50%で復活
if(s.type==="revive"){
    if(deadPlayers.length > 0){
        let revived = deadPlayers.pop();
        revived.currentHp = Math.floor(revived.hp * s.power);
        revived.cool = 0;
        players.push(revived);
        let wi = players.length - 1;
        renderBattle();
        setTimeout(()=>{
            showDamage("p"+wi, {dmg:revived.currentHp, type:"heal"});
            showSynergyText("⬆ 蘇生！" + revived.name + "が復活！");
        }, 10);
    } else {
        showSynergyText("⬆ 蘇生失敗…倒れた味方がいない");
    }
}

// ⬇ 全弱体: 敵ATK低下 + 被ダメ倍増マーク
if(s.type==="allDebuff"){
    enemy.debuffTurn = 4;
    enemy.debuffPower = s.power;
    enemy.allDebuffMark = true;   // 被ダメ1.5倍フラグ（ターン持続）
    enemy.allDebuffTurn = 3;      // 3ターン間持続
    showSynergyText("⬇ 全弱体発動！ATK低下＆被ダメ増！感電と重複！");
    renderBattle();
}

// 🛡 挑発: 自分が3T攻撃を引き受け、被ダメ半減
if(s.type==="taunt"){
    p.taunt = { turn: s.turn };
    if(!p.shields) p.shields = [];
    p.shields.push({ turn: s.turn, power: 0.5 }); // 被ダメ50%軽減と兼用
    showSynergyText("🛡 挑発！攻撃を引き受けるぞ！");
    renderBattle();
}

p.cool = p.skill.cool;
endTurn();
}

}

    if(c.rarity === 2) cost = 10;

}

function startEventBattle(i){

let prog = eventProgress[i] || 1;

// ステージ取得
let stage = e.stages[prog-1];

// 味方
players = applyTeamBuff(team.map(c=>{
    let base =
        chars.find(ch => ch.name === c.name) ||
        eventChars.find(ch => ch.name === c.name) ||
        eventChars2.find(ch => ch.name === c.name) ||
        eventChars3.find(ch => ch.name === c.name) ||
        eventChars4.find(ch => ch.name === c.name) ||
        eventChars5.find(ch => ch.name === c.name) ||
        eventChars6.find(ch => ch.name === c.name) ||

    let weapon = c.weapon;

    let finalAtk = c.atk + (weapon?.atk || 0);
    let finalHp = c.hp + (weapon?.hp || 0);

    return {
        ...c,
        atk: finalAtk,
        hp: finalHp,
        currentHp: finalHp,
        skill: base?.skill || c.skill,
        weapon: c.weapon ? {...c.weapon} : null,
        weaponCool: 0,
        debuffPower: 1, // 通常は1倍
        debuffTurn: 0   // 残りターン
    };
}));

    turnBuffStacks: 0
};

turn="player";

function Eventwin(){

if(currentEvent !== undefined){

    let prog = eventProgress[currentEvent] || 1;
    let e = eventStages[currentEvent];

    // 🔥 初回クリア判定
    if(!eventProgress["clear_"+currentEvent]){

        // ★毎回報酬 → 初回だけに変更
        stone += e.reward;

    }

    prog++;

    if(prog > e.stages.length){

        alert("🎉イベント完全制覇！");

        // 🔥 初回のみ
        if(!eventProgress["clear_"+currentEvent]){

            // ボス報酬
            stone += e.bossReward || 0;

            // キャラ報酬
            let rewardChar = e.rewardChar;
            if(rewardChar){
                addToBox(rewardChar);
                alert("新キャラGET！！「" + rewardChar.name + "」");
            }

            // クリアフラグ
            eventProgress["clear_"+currentEvent] = true;
        }

        prog = e.stages.length;

    }else{
        alert("ステージクリア！");
    }

    eventProgress[currentEvent] = prog;

    saveData();

    currentEvent = undefined;

    go("event");
    return;
}
}

function weaponSkill(){
    let p = players[turnIndex];
    let s = p.weapon?.skill;
    if(!s) return;

    if(p.weaponCool > 0) return;

    let atk = p.atk;

if(s.type==="buff"){
    p.atk *= s.power;
}

    if(s.type === "damage"){
        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;
        setTimeout(()=>showDamage("enemy", res),10);
    }

    if(s.type === "poison"){
        enemy.poisons ||= [];
        enemy.poisons.push({
            power: s.power,
            turn:3,
            user:p
        });
    }

if(s.type === "rage"){
    let ratio = 1 - (p.currentHp / p.hp); // 減ってるほど強い
    let dmg = Math.floor(atk * (1 + ratio * (s.power - 1) * 3));

    enemy.hp -= dmg;

    renderBattle();

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "ultimate"
        });
    },10);
}

if(s.type==="multi"){

    for(let i=0;i<s.hits;i++){

        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;

        // 🔻ヒットごとにデバフ
        if(!enemy.debuffUsed){
            enemy.atk *= 0.95; // ←ここ調整ポイント
        }

        setTimeout(()=>{
            showDamage("enemy", res);

            if(i === s.hits - 1){
                enemy.debuffUsed = true; // 最後に固定
                renderBattle();
            }

        }, i * 120);
    }
}

if(s.type==="heal"){
players.forEach((t,i)=>{
    let heal = t.hp * s.power;

    t.currentHp += heal;
    if(t.currentHp > t.hp) t.currentHp = t.hp;

    setTimeout(()=>{
        showDamage("p"+i, {
            dmg: heal,
            type: "heal"
        });
    },10);
});}

    p.weaponCool = 3

    renderBattle();
    endTurn();
}

function getRarityColor(r){

    if(r===2) return "deepskyblue";

function getWeapon(){

    let r = Math.random()*100;
    let sum = 0;
    let rarity = 1;

    for(let w of weaponRates){
        sum += w.rate;
        if(r < sum){
            rarity = w.rarity;
            break;
        }
    }

    let pool = weapons.filter(w=>w.rarity===rarity);

    return pool[Math.random()*pool.length|0];
}
