<style>
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loadingBox{
  text-align:center;
}

.loadingLogo{
  width:220px;
  margin-bottom:20px;
  animation:logoFade 2s infinite;
}

@keyframes logoFade{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

.loadingBar{
  width:200px;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto 10px;
}

#loadingFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff4444);
  transition:0.2s;
}

.loadingText{
  font-size:14px;
  letter-spacing:2px;
}

body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
.screen{display:none;padding:10px;text-align:center}
.active{display:block}

.fire{border:3px solid #ff4444}
.water{border:3px solid #4488ff}
.thunder{border:3px solid #ffd700}
.wood{border:3px solid #44cc44}
.light{border:3px solid #ffffff}
.dark{border:3px solid #aa00ff}

.card{
display:inline-block;
background:#1a1f2e;
padding:6px;margin:5px;
border-radius:10px;width:95px;
}
.card img{width:100%;border-radius:8px}
.ssr{box-shadow:0 0 20px gold}

.rarity{
font-size:12px;
color:gold;
font-weight:bold;
margin-bottom:2px;
}

.flash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
animation:flash 0.6s;
}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

.flip{position:relative;width:90px;height:120px;transform-style:preserve-3d;transition:0.6s}
.open .flip{transform:rotateY(180deg)}
.front,.back{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;
}
.front{background:#444}
.back{transform:rotateY(180deg);background:#1a1f2e}

#battleMain{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
max-width:520px;
margin:auto;
}

.teamArea{
display:flex;
flex-direction:column;
gap:8px;
width:40%;
align-items:center;
}

#enemyArea{
width:55%;
display:flex;
justify-content:center;
}

.unit{
background:#1a1f2e;
padding:6px;
border-radius:12px;
font-size:10px;
position:relative;
}

.ally{width:140px;}
.unit img{
width:100%;
max-height:90px;
object-fit:cover;
border-radius:8px;
}

.enemy{width:160px;}

.turn{
outline:2px solid yellow;
box-shadow:0 0 6px yellow;
}

.bar{background:#333;height:8px;border-radius:5px;margin-top:3px;}
.hp{background:#4caf50;height:8px;}
.gauge{background:#ff9800;height:6px;}

.damage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:28px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #000,0 0 5px #000;
animation:damagePop 0.9s forwards;
pointer-events:none;
}

@keyframes damagePop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-100%) scale(0.8);}
}

.weak{color:#ff4444}
.resist{color:#44aaff}
.rainbowFlash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple);
opacity:0.8;
animation:rainbow 0.8s forwards;
z-index:999;
}

@keyframes rainbow{
0%{opacity:1;}
100%{opacity:0;}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

.ultra{
box-shadow:0 0 25px cyan,0 0 40px magenta;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

.eventFlash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffff);
opacity:0.8;
animation:eventFlash 0.8s forwards;
z-index:999;
}

@keyframes eventFlash{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(1.2);}
}

.banner{
animation:bannerGlow 1.5s infinite alternate;
}
@keyframes bannerGlow{
from{filter:brightness(1);}
to{filter:brightness(1.3);}
}

#gameTitle{
  width: 350px;   /* 好きなサイズに変更 */
  height: auto;   /* 縦横比維持 */

.status{
font-size:12px;
margin:4px 0;

#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loadingText{
  font-size:24px;
  color:#fff;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

.hitText{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
color:#ffcc00;
text-shadow:0 0 8px #000;
animation:hitPop 0.8s forwards;
}

.totalDamage{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
color:#ff4444;
text-shadow:0 0 10px #000;
animation:totalPop 1s forwards;
}
@keyframes hitPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-30px) scale(1);}
}

@keyframes totalPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.3);}
100%{opacity:0;transform:translate(-50%,-40px) scale(1);}
}

</style>

<script>
function applyTeamBuff(players){

let buff = getTeamBuff(players); // ←これ追加

return players.map(p=>{
    return {
        ...p,
        atk: Math.floor(p.atk * (1 + buff.atk / 100)),
        hp: Math.floor(p.hp * (1 + buff.hp / 100)),
        currentHp: Math.floor(p.hp * (1 + buff.hp / 100)),
        ult: 0,
        cool: 0
    };
});
}

function saveData(){
const data = {
stone,
box,
team,
progress,
dupeStone,
eventProgress // ←追加
};
localStorage.setItem("gachaData", JSON.stringify(data));
}

progress = data.progress ?? {};
dupeStone = data.dupeStone ?? 0;
eventProgress = data.eventProgress ?? {};

const charDescriptions = {
  "室井元武": "室井元武は、生きる気力を失っていたが、固有能罪符「刃牙刃牙(DT砲)」を自覚し、戦士として目覚める。自身の筋肉を増強する能力に最初は落胆するも、仲間たちとの出会いと経験を経て、強敵に立ち向かう不屈の精神を持つ主人公へと成長する。後に「珍古砲(アームストロング砲)」を受け継ぎ、世界の命運を背負うことになる。",
  "栗島トウヤ": "栗島トウヤは左手が義手の少年。固有能罪符「forfive砲」を持ち、瞬間移動能力を操る。過去に秘密を抱え、両親を探すことを目的に旅をする。フセインとの修行で聡式魔術を習得し、力を増した。クールに見えるが、誰よりも仲間のために戦う、熱い心を持つ人物。",
　"鈴鹿":"鈴鹿は、元武とトウヤを助ける存在として登場した。固有能罪符「幸せの作り方(ネオハピネス)で安全地帯を生み出し、その中で能力を強化する。物語が進むにつれて、彼女の過去や目的が明かされていく。」",
  "死橋轟": "死橋轟は、緑藻の弓を武器に「全追尾」を駆使して戦う。かつてイミュータブルに所属していた過去を持つ。冷静だが熱い一面を持ち、敵に敗北しても立ち上がる不屈の精神を持つ。後にデッドアイデンティティの髪、死橋凪の息子であることが判明する。",
  "沢華": "沢華は、求武達の前に現れた青髪の女性で、ホーレンやボムブと協力して求武達の力を試していた。固有能罪符「竹取の翁(トゥルーカラーズ)」で小さな竹を出し、緊急時にはトウヤを庇うなど。仲間思いな一面を持つ。",
　"阿波牛壬陸":"壬陸は、阿波牛星夜の妹で、兄を探すために元武達と旅をする。固有能罪符「奢れるものも久しからず(ルイヴィトン)」は、弱い相手には効果が薄く、地震より強い相手には効果を発揮する。",
  "阿波牛星夜": "阿波牛星夜は第二先遣隊の隊長で、豪快な性格の持ち主・自身の固有能罪符「珍古砲」と卓越した身体能力を用いて戦う。後に力を失うも、求武に「珍古砲」を託し死亡。その後復活し、連合に協力。数少ないトウヤの過去を知る人物。",
  "コード5.2": "コード5.2は、第一先遣隊の隊長で、「this is a pen(エンライトメント)」という脳汁に応じてパワーが上がる能力を持つ。元は先遣隊として戦う宿命だったが、元武との闘いを経て連合側に協力するように。",
　"FqEa":"FqEaは第一先遣隊の副隊長で「ボールは友達(イマジナリーフレンド)」を用いた時間操作が可能。元第一先遣隊の隊長である玉垣剣城を探している。時間操作と高いセンスを生かした戦闘スタイルが特徴。",
  "湯照司吉基": "湯照司吉基は、予知能力「if it is」を持つ第二先遣隊の副隊長。阿波牛星夜の行方を探すため求武達に近づくも、徐々に仲間意識が芽生える。冷静沈着だが予知能力故に苦悩も抱える。",
  "明石啓希": "明石啓希は、第六先遣隊隊長。固有能罪符「解錠」で自身の限界を引き出して戦う。連合に加入後は、フルパワーで支援。冷静さと熱意を兼ね備え、頼れるリーダーシップを発揮する。",
　"珠濃雅紀":"珠濃雅紀は、第六先遣隊の副隊長。固有能罪符「再構築」を武器に戦う。叉類雪落では、連合側に勝利をもたらした初の人物。",
  "黒峰天音": "黒峰天音は、第五先遣隊の副隊長で、「烈火の舞」を使用する。叉類雪落では、明石啓希により無意識状態になり、連合・先遣隊問わず多数を撃破した。",
  "晴海亨": "晴海亨は第五先遣隊隊長で、固有能罪符「視覚共有(サイトシェア)」を持つ。複数の視覚を駆使して相手の動きを分析し、優位に立とうとする。",
　"甲斐翔也":"甲斐翔也は第四先遣隊の隊長で、叉類雪落時は阿波牛星夜と交戦。固有能罪符「カリスマ」によるコピー能力を使う。高いセンスと身体能力で先遣隊を勝利に導いた。",
  "赤羽悠真": "赤羽悠真は第四先遣隊の副隊長で、「幸運」も使い戦う。自身の周りの人間の運を底上げする力を持ち、戦いを有利に進める。",
  "桜木彰": "桜木彰は第三先遣隊の隊長で、「オフセット」の持ち主。室井求武に敗北後連合に加入されるも、断った。",
　"八並解徒":"第三先遣隊の副隊長である八並解徒は、固有能罪符「一触即没」を持つ。「in my life【運命の紐】」という魔術を開発した。",
  "玉垣剣城": "玉垣剣城は、イミュータブルのNo.1。かつては第一先遣隊の隊長だった。固有能罪符「無限重力(レクイエム)」による高速移動と抜刀術を得意とする。かつての仲間である5.2やFqEaと対峙するも、イミュータブルとしての道を選び、激しい戦いを繰り広げる。",
  "蒼井朔也": "蒼井朔也は、イミュータブルのNo.2。固有能罪符は「運命と黄昏の同化(ニューメイキング)」と「刃牙刃牙」を持つ。武器の扱いは作中トップクラスで自身の狙撃術により戦場を乱す。",
　"石倉有栖":"石倉有栖はイミュータブルのNo.3。固有能罪符「生前死後のキャスティング(MOVIE)で前世と来世の固有能罪符が使えるが、現在は「異分子耐性」のみ使用。阿波牛星夜と互角に戦えるだけの戦闘力を持つ。",
  "ミニモータ": "ミニモータはイミュータブルのNo.4で「草の対義語(死刑教育)」を持つ。「草睲術」を開発しており、エネルギーの扱いはイミュータブルでも随一。",
  "ソーメーン": "ソーメーンはイミュータブルのNo.5。固有能罪符「双雷の裁き(フォルテシモ)」を使う。轟と天音のリベンジマッチに割って入り、後に剣城の指示で天音と戦う。",
　"跳田収滋":"イミュータブルのNo.6。固有能罪符「神器の収納術(スペースストッカー)」を持つ。玉垣剣城の刀や蒼井朔也の銃など様々な武器を持ち運んでいる。",
  "オリバー": "オリバーはイミュータブルのNo.8。固有能罪符は「無許可の模倣者(ミラーマスター)」。動物の特性を生かした戦術を得意とし、トリッキーな戦い方をする。",
  "弐呪刻": "ジャックナイフの神であり「略奪」の固有能罪符を持つトリックスター。戦いを好み、実力者をジャックナイフに招待する。神でありながら人間側に肩入れするなど、その高度原理は謎に包まれている。",
　"黒瀬武人":"黒瀬武人は、楽園(マジシヤモ)の神リボルトの後継者であり付き人。固有能罪符「破壊的で覇界的な一撃(ユージュアルコンカラー)」と「未知な道(プレイフルキング)」を持ち。超人的な身体能力と物質の強度を一時的に上げる能力を持つ。リボルトに忠誠を誓い、冷静沈着に任務を遂行する。",
  "フセイン": "フセイン・チューイは、シンギュラリティの神であり、「全知全識」ですべてを見通す。元人間で機械化されており、元武達に興味を持ち、物語に深く関わる存在。聖戦天使神響の主催者であり、トウヤの師匠。",
  "リボルト": "リボルトは楽園の神で、「万世諸行」を持つ。自分の魂を他の物に移し替えることができる。後継者の黒瀬武人と共に登場し、破天荒な性格が特徴。",
　"死橋凪":"死橋凪は轟の父親で、デッドアイデンティティの神。かつては珍子とワールドインフレを探し、現在は神として傍観者の立場をとる。「全構築」という強力な固有能罪符を持ち、命と引き換えに武器を生成する。",
  "アステレス": "アステレスは、セレスティエデンの神で、固有能罪符は「番いの救済(アルカナ)」と「偽りの厄災(エニグマ)」。回復能力と物体サイズの変更が可能。神会議にも参加する重要なキャラクター。",
  "バルナウス": "バルナウスは、海星の神であり海賊団の船長。固有能罪符「荒くれ物の結束(ラフネック・アライアンス)」により、エネルギーで具現化した人形を作りだす。阿波牛星夜を死地から救った人物。",
　"ゲガント":"固有能罪符「再生」を持つキャラクター。求武達が一番初めに倒した相手。",
  "ホーレン": "「空気殺し」を持つキャラクター。ボムブにより役目を終える。",
  "ボムブ": "固有能罪符「地雷」を持つキャラクター。元武、トウヤ、轟の連携の前に敗北。",
　"霊剛":"固有能罪符「ポルターガイスト」を持つ聖戦天使神響の参加者。求武に敗北。",
  "安村康夫": "「火薬庫」を持つキャラクター。聖戦天使神響に参加するも、トウヤの聡式魔術により脱落。",
  "返網転": "「死神大天国」を持つ聖戦天使神響の参加者。準決勝にてFqEaと戦闘し、敗北。",
　"和辺重治":"和辺重治は、元先遣隊で、聖戦天使神響の参加者。「迷走迷路」を使いコード5.2と戦う。",
  "和辺重信": "固有能罪符「因果反発」を駆使してFqEaと戦うが圧倒的センスの前に敗北。",
  "ヒナル": "固有能罪符「ガス杀ン殳」を用いて戦う。自身の能力で故郷を守っていた。聖戦天使神響で返網転に敗北後、マタイの能力で死亡。",
　"マタイ":"固有能罪符「崩壊暗殺時間(ヘルカウント)」を持つ。準決勝にてコード5.2と戦い敗北。",
  "ログフ": "固有能罪符「陣地生成(フリーエリア)」を持つ。轟に敗北。"
};

function openDex(){
  const dex = document.getElementById("dex");
  const list = document.getElementById("dexList");

  dex.style.display = "block";

const rewardChars = eventStages.map(e => e.rewardChar);

let allChars = [];

[chars, eventChars, eventChars2, eventChars3,eventChars4,rewardChars].forEach(arr => {
  if (Array.isArray(arr)) {
    allChars.push(...arr);
  }
});

list.innerHTML = allChars.map(c => `
  <div style="display:flex; gap:10px; margin:10px;">
    <img src="${c.img || 'https://via.placeholder.com/80'}" style="width:80px">
    <div>
      ${c.name || "名前なし"}<br>
      ${charDescriptions[c.name] || "説明なし"}
    </div>
  </div>
`).join("");
}

function closeDex(){
  document.getElementById("dex").style.display = "none";
}

function star(r){return "★".repeat(r);}

function getGachaChar(){
let r=Math.random();
let rarity;

if(r < 0.70) rarity = 1;
else if(r < 0.90) rarity = 2;
else if(r < 0.99)rarity = 3;
else rarity =4;

// 🔥通常キャラだけ
let pool = chars.filter(c=>c.rarity==rarity);

return pool[Math.random()*pool.length|0];
}

function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
update();
if(id==="trial")renderTrials();
if(id==="event") renderEvent(); // ←追加
}
function draw1(){
if(stone < 10) return;
stone -= 10;

gachaResult.innerHTML="";

// 演出
let flash=document.createElement("div");
flash.className="flash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

// キャラ取得
let c = getGachaChar();

// 表示
// ☆4専用演出
if(c.rarity === 4){

// 虹フラッシュ
let rainbow=document.createElement("div");
rainbow.className="rainbowFlash";
document.body.appendChild(rainbow);
setTimeout(()=>rainbow.remove(),800);

// 画面揺れ
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);

update();
saveData();

}
let div=document.createElement("div");
div.className=`card ${attrClass[c.attr]}`;
div.innerHTML=`
<div class="flip">
<div class="front"></div>
<div class="back ${c.rarity==3?"ssr":""}">
<div class="rarity">${star(c.rarity)}</div>
<img src="${c.img}">
${c.name}

function enemyTurn(){

let target = players[Math.floor(Math.random() * players.length)];
let index = players.indexOf(target); // ←固定（超重要）

let res = calcDamage(enemy.attr, target.attr, enemy.atk);

if(target.shield && target.shield.turn > 0){
    res.dmg *= (1 - target.shield.power);
}

target.currentHp -= res.dmg;

// 🔥 先に描画
renderBattle();

// 🔥 ダメージ表示（1回だけ）
setTimeout(()=>{
    showDamage("p" + index, res);
}, 50);

// 💀 敵の毒
if(enemy.poisons){

    let delay = 0;

    enemy.poisons = enemy.poisons.filter(poison=>{

    let atk = poison.user.atk;

    // 🔥 バフ適用
    if(poison.user.buffs){
        poison.user.buffs.forEach(b=>{
            atk *= b.power;
        });
    }

    let dmg = atk * poison.power;
    enemy.hp -= dmg;

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "poison"
        });
    }, delay);

    delay += 120;

    poison.turn--;

    if(enemy.hp <= 0){
        setTimeout(()=>win(), 500);
        return false;
    }

    return poison.turn > 0;
});

}


// 反撃
let delay = 0;

players.forEach(t=>{
    if(t.counter && t.counter.turn > 0){
        let res2 = calcDamage(t.attr, enemy.attr, t.atk * t.counter.power);
        enemy.hp -= res2.dmg;

        setTimeout(()=>{
            showDamage("enemy", {...res2, type:"weak"});
        }, delay);

        delay += 150;
        t.counter.turn--;

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}
    }
});

// 🔥 💥ここが核心：死亡処理を遅らせる
setTimeout(()=>{

    players = players.filter(p=>p.currentHp > 0);

    if(players.length === 0){
        alert("敗北");

        if(currentEvent !== undefined){
            currentEvent = undefined;
            go("event");
        }else{
            go("trial");
        }
        return;
    }

    // シールド減少
    players.forEach(p=>{
        if(p.shield && p.shield.turn > 0){
            p.shield.turn--;
        }
    });

    turn = "player";
    turnIndex = 0;
    renderBattle();

}, 500); // ←表示時間に合わせる
}

function endTurn(){
let p = players[turnIndex];

if(p.buffs){
    p.buffs = p.buffs.filter(b=>{
        b.turn--;
        return b.turn > 0;
    });
}

if(p.cool > 0) p.cool--;

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

turnIndex++;
if(turnIndex>=players.length){
turn="enemy";
setTimeout(enemyTurn,700);
turnIndex=0;
}
renderBattle();
}

function getTeamBuff(team){
let atkBuff = 0;
let hpBuff = 0;

team.forEach(c=>{
    if(c.rarity === 4){
        atkBuff += 0.30;
        hpBuff += 0.30;
    }else if(c.rarity === 3){
        atkBuff += 0.15;
        hpBuff += 0.15;
    }
});

// 必要なら上限
// atkBuff = Math.min(atkBuff, 0.5);
// hpBuff = Math.min(hpBuff, 0.5);

return {
    atk: Math.floor(atkBuff * 100),
    hp: Math.floor(hpBuff * 100)
};
}

function skill(){
let p = players[turnIndex];

if(!p.skill || !p.skill.type) return;
if(p.cool > 0) return;

let s = p.skill;

// バフ込みATK
let atk = p.atk;

if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

// 🔥 単発ダメージ
if(s.type==="damage"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;

    renderBattle();
    setTimeout(()=>showDamage("enemy", res),10);
}

// 🔥 多段（←ここが一番重要）
if(s.type==="multi"){

    for(let i=0;i<s.hits;i++){

        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;

        // 🔻ヒットごとにデバフ
        if(!enemy.debuffUsed){
            enemy.atk *= 0.95; // ←ここ調整ポイント
        }

        setTimeout(()=>{
            showDamage("enemy", res);

            if(i === s.hits - 1){
                enemy.debuffUsed = true; // 最後に固定
                renderBattle();
            }

        }, i * 120);
    }
}

// 💚 回復
if(s.type==="heal"){
players.forEach((t,i)=>{
    let heal = t.hp * s.power;

    t.currentHp += heal;
    if(t.currentHp > t.hp) t.currentHp = t.hp;

    setTimeout(()=>{
        showDamage("p"+i, {
            dmg: heal,
            type: "heal"
        });
    },10);
});

renderBattle();
}

// 🔺 バフ
if(s.type==="buff"){
    p.atk *= s.power;
}

// 🔻 デバフ
if(s.type==="debuff"){

    let power = s.power;

    if(currentEvent !== undefined){
        power = 1 - (1 - power) * 0.5;
    }

    enemy.atk *= power;
}

// ☠ 毒
if(s.type==="poison"){
if(!enemy.poisons) enemy.poisons = [];

enemy.poisons.push({
    power: s.power,
    turn: 99,
    user: p
});
}

// 👥 全体バフ
if(s.type==="teamBuff"){
    players.forEach(t=>{

        if(!t.buffs) t.buffs = [];

        t.buffs.push({
            turn: 3,
            power: s.power
        });
    });
}

// 🛡 カウンター
if(s.type==="counter"){
    p.counter = {
        turn: s.turn,
        power: s.power
    };
}

// 💖 瀕死の一撃
if(s.type === "rage"){
    let ratio = 1 - (p.currentHp / p.hp); // 減ってるほど強い
    let dmg = Math.floor(atk * (1 + ratio * (s.power - 1) * 3));

    enemy.hp -= dmg;

    renderBattle();

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "ultimate"
        });
    },10);
}
// 🔥 ドレイン
if(s.type==="drain"){
    let idx = turnIndex; // ←これ追加（超重要）

    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    enemy.hp -= res.dmg;

    let heal = res.dmg * 0.5;
    p.currentHp += heal;
    if(p.currentHp > p.hp) p.currentHp = p.hp;

    renderBattle();

    // ダメージ
    setTimeout(()=>{
        showDamage("enemy", res);
    },10);

    // 回復（ちゃんと自分に出る）
    setTimeout(()=>{
        showDamage("p"+idx, {
            dmg: heal,
            type: "heal"
        });
    },120);
}

// 💀 HPカット
if(s.type==="hpCut"){
    let dmg = enemy.maxHp * s.power;
    enemy.hp -= dmg;

    renderBattle();
    setTimeout(()=>showDamage("enemy",{dmg,type:""}),10);
}

// ⚡ 2回攻撃
if(s.type==="double"){
    let res = calcDamage(p.attr, enemy.attr, atk * s.power);
    let res2 = calcDamage(p.attr, enemy.attr, atk * 0.5);

    enemy.hp -= res.dmg;
    enemy.hp -= res2.dmg;

    renderBattle();

    setTimeout(()=>showDamage("enemy", res),10);
    setTimeout(()=>showDamage("enemy", res2),160);
}

// 🛡 シールド
if(s.type==="shield"){
    p.shield = {
        turn: s.turn,
        power: s.power
    };
}

// CT
p.cool = s.cool || 2;

endTurn();
}

function useDupe(i){

    if(c.rarity === 2) cost = 10;

    if(c.rarity === 4) cost = 100;

    if(dupeStone < cost){
        alert("凸塊が足りない");
        return;
    }

    dupeStone -= cost;
    c.dupe++;

    if(c.rarity===1){

    }else if(c.rarity===4){

    }

    c.atk += atkUp;
    c.hp += hpUp;

    update();
    saveData();
}

    };
}));

    hp: stage.hp,
    maxHp: stage.hp,

};

        stone += e.reward;

    prog++;

        // 🔥 初回のみ
        if(!eventProgress["clear_"+currentEvent]){

            // ボス報酬
            stone += e.bossReward || 0;

            let r
Char = e.rewardChar;
            if(rewardChar){

            }
