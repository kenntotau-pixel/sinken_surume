<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真剣のスルーメ</title>
<meta name="theme-color" content="#0b0f1a">

<style>
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loadingBox{
  text-align:center;
}

.loadingLogo{
  width:220px;
  margin-bottom:20px;
  animation:logoFade 2s infinite;
}

@keyframes logoFade{
  0%{opacity:0.5;}
  50%{opacity:1;}
  100%{opacity:0.5;}
}

.loadingBar{
  width:200px;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin:0 auto 10px;
}

#loadingFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff4444);
  transition:0.2s;
}

.loadingText{
  font-size:14px;
  letter-spacing:2px;
}

body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif}
.screen{display:none;padding:10px;text-align:center}
.active{display:block}

.fire{border:3px solid #ff4444}
.water{border:3px solid #4488ff}
.thunder{border:3px solid #ffd700}
.wood{border:3px solid #44cc44}
.light{border:3px solid #ffffff}
.dark{border:3px solid #aa00ff}

.card{
display:inline-block;
background:#1a1f2e;
padding:6px;margin:5px;
border-radius:10px;width:95px;
}
.card img{width:100%;border-radius:8px}
.ssr{box-shadow:0 0 20px gold}

.rarity{
font-size:12px;
color:gold;
font-weight:bold;
margin-bottom:2px;
}

.flash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle,rgba(255,255,255,0.8),transparent);
animation:flash 0.6s;
}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

.flip{position:relative;width:90px;height:120px;transform-style:preserve-3d;transition:0.6s}
.open .flip{transform:rotateY(180deg)}
.front,.back{
position:absolute;width:100%;height:100%;
backface-visibility:hidden;border-radius:10px;
}
.front{background:#444}
.back{transform:rotateY(180deg);background:#1a1f2e}

#battleMain{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
max-width:520px;
margin:auto;
}

.teamArea{
display:flex;
flex-direction:column;
gap:8px;
width:40%;
align-items:center;
}

#enemyArea{
width:55%;
display:flex;
justify-content:center;
}

.unit{
background:#1a1f2e;
padding:6px;
border-radius:12px;
font-size:10px;
position:relative;
}

.ally{width:140px;}
.unit img{
width:100%;
max-height:90px;
object-fit:cover;
border-radius:8px;
}

.enemy{width:160px;}

.turn{
outline:2px solid yellow;
box-shadow:0 0 6px yellow;
}

.bar{background:#333;height:8px;border-radius:5px;margin-top:3px;}
.hp{background:#4caf50;height:8px;}
.gauge{background:#ff9800;height:6px;}

.damage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(1);
font-size:28px;
font-weight:bold;
color:#fff;
text-shadow:0 0 10px #000,0 0 5px #000;
animation:damagePop 0.9s forwards;
pointer-events:none;
}

@keyframes damagePop{
0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
20%{opacity:1;transform:translate(-50%,-60%) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-100%) scale(0.8);}
}

.weak{color:#ff4444}
.resist{color:#44aaff}
.rainbowFlash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple);
opacity:0.8;
animation:rainbow 0.8s forwards;
z-index:999;
}

@keyframes rainbow{
0%{opacity:1;}
100%{opacity:0;}
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0);}
25%{transform:translate(-5px,5px);}
50%{transform:translate(5px,-5px);}
75%{transform:translate(-5px,5px);}
100%{transform:translate(0,0);}
}

.ultra{
box-shadow:0 0 25px cyan,0 0 40px magenta;
animation:glow 1s infinite alternate;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.6);}
}

.eventFlash{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(135deg,#ff00cc,#3333ff,#00ffff);
opacity:0.8;
animation:eventFlash 0.8s forwards;
z-index:999;
}

@keyframes eventFlash{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(1.2);}
}

.banner{
animation:bannerGlow 1.5s infinite alternate;
}
@keyframes bannerGlow{
from{filter:brightness(1);}
to{filter:brightness(1.3);}
}

#gameTitle{
  width: 350px;   /* 好きなサイズに変更 */
  height: auto;   /* 縦横比維持 */
}

.status{
font-size:12px;
margin:4px 0;
min-height:14px;
}


.loadingText{
  font-size:24px;
  color:#fff;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}

.hitText{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:bold;
color:#ffcc00;
text-shadow:0 0 8px #000;
animation:hitPop 0.8s forwards;
}

.totalDamage{
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
color:#ff4444;
text-shadow:0 0 10px #000;
animation:totalPop 1s forwards;
}


@keyframes hitPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.2);}
100%{opacity:0;transform:translate(-50%,-30px) scale(1);}
}

@keyframes totalPop{
0%{opacity:0;transform:translate(-50%,0) scale(0.5);}
30%{opacity:1;transform:translate(-50%,-10px) scale(1.3);}
100%{opacity:0;transform:translate(-50%,-40px) scale(1);}
}

.dexRow{
  display:flex;
  align-items:center;
  background:#1a1f2e;
  margin:6px;
  padding:8px;
  border-radius:10px;
  gap:10px;
}

.dexRow img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:8px;
}

.dexText{
  text-align:left;
  font-size:14px;
}

/* ===== Phase1追加: 状態異常アイコン ===== */
.statusRow{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin-top:3px;
  min-height:18px;
}
.sBadge{
  font-size:10px;
  padding:1px 4px;
  border-radius:4px;
  font-weight:bold;
}
.sBurn{background:#ff4400;color:#fff;}
.sFreeze{background:#44bbff;color:#fff;}
.sShock{background:#ffdd00;color:#000;}
.sPoison{background:#aa44ff;color:#fff;}
.sShield{background:#44aaff;color:#fff;}
.sCounter{background:#ff8800;color:#fff;}
.sBuff{background:#44ff88;color:#000;}
.sDebuff{background:#8866ff;color:#fff;}
.sPassive{background:#1a3a1a;color:#88ff88;border:1px solid #44cc44;}

/* ===== Phase1追加: ロールバッジ ===== */
.roleBadge{
  display:inline-block;
  font-size:9px;
  padding:1px 5px;
  border-radius:4px;
  font-weight:bold;
  margin-bottom:2px;
}
.role-attacker{background:#ff4444;color:#fff;}
.role-tank{background:#4488ff;color:#fff;}
.role-support{background:#44cc44;color:#fff;}
.role-debuffer{background:#aa44ff;color:#fff;}

/* ===== Phase1追加: CTゲージ強化 ===== */
.ctWrap{display:flex;align-items:center;gap:3px;margin-top:2px;}
.ctLabel{font-size:9px;color:#aaa;width:18px;}
.ctBar{flex:1;height:5px;background:#333;border-radius:3px;overflow:hidden;}
.ctFill{height:100%;background:linear-gradient(90deg,#ff9800,#ffcc00);border-radius:3px;transition:width 0.2s;}
.ctFillReady{height:100%;background:#44ff88;border-radius:3px;width:100%;}

/* ===== Phase1追加: シナジー発動テキスト ===== */
.synergyText{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:26px;
  font-weight:bold;
  color:#fff;
  text-shadow:0 0 20px #ff0088,0 0 10px #ff0088;
  animation:synergyPop 1.2s forwards;
  pointer-events:none;
  z-index:9998;
  text-align:center;
  white-space:nowrap;
}
@keyframes synergyPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}
  20%{opacity:1;transform:translate(-50%,-60%) scale(1.3);}
  80%{opacity:1;transform:translate(-50%,-65%) scale(1.1);}
  100%{opacity:0;transform:translate(-50%,-80%) scale(0.9);}
}

/* ===== Phase1追加: 敵ギミックバッジ ===== */
.gimmickRow{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin-top:4px;
}
.gBadge{
  font-size:9px;
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
  background:#333;
  color:#ffd700;
  border:1px solid #ffd700;
}

/* ===== Phase1追加: 状態異常ダメージ色 ===== */
.dmgBurn{color:#ff6600!important;}
.dmgFreeze{color:#44ddff!important;}
.dmgShock{color:#ffee00!important;}
.dmgSynergy{color:#ff00cc!important;font-size:36px!important;}

/* ===== スキル確認モーダル ===== */
#skillModal{
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.75);
  z-index:10000;
  justify-content:center;
  align-items:center;
}
#skillModal.open{display:flex;}
#skillModalBox{
  background:#1a1f2e;
  border:2px solid #ffd700;
  border-radius:14px;
  padding:20px 24px;
  max-width:320px;
  width:90%;
  text-align:center;
  position:relative;
}
#skillModalBox img{
  width:80px;height:80px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
}
#skillModalName{
  font-size:16px;font-weight:bold;
  margin-bottom:6px;
}
#skillModalText{
  font-size:14px;
  color:#ffd700;
  margin-bottom:6px;
  line-height:1.5;
}
#skillModalCT{
  font-size:12px;color:#aaa;
  margin-bottom:12px;
}
#skillModalClose{
  background:#333;color:#fff;
  border:none;border-radius:8px;
  padding:6px 20px;cursor:pointer;
  font-size:14px;
}
.skillBtn{
  margin-top:4px;
  background:#2a3a5a;
  color:#ffd700;
  border:1px solid #ffd700;
  border-radius:6px;
  padding:2px 8px;
  font-size:11px;
  cursor:pointer;
}

/* ===== スキルツリーモーダル ===== */
#skillTreeModal{
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  z-index:10001;
  justify-content:center;
  align-items:center;
}
#skillTreeModal.open{display:flex;}
#skillTreeBox{
  background:#0d1120;
  border:2px solid #44cc88;
  border-radius:16px;
  padding:18px 14px;
  max-width:340px;
  width:92%;
  text-align:center;
  position:relative;
  max-height:88vh;
  overflow-y:auto;
}
.stNode{
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:88px;
  min-height:72px;
  border-radius:10px;
  padding:5px 4px;
  font-size:10px;
  border:2px solid #444;
  background:#111;
  color:#666;
  margin:3px;
  transition:0.2s;
  cursor:not-allowed;
}
.stNode.unlocked{
  background:#1a3a20;
  border-color:#ffd700;
  color:#ffd700;
  box-shadow:0 0 8px #ffd70066;
  cursor:default;
}
.stNode.available{
  border-color:#44cc88;
  background:#0d2010;
  color:#88ffaa;
  cursor:pointer;
  animation:stPulse 1.6s infinite alternate;
}
.stNode.skipped{
  background:#0d0d0d;
  border-color:#333;
  color:#333;
  cursor:default;
  opacity:0.4;
}
@keyframes stPulse{
  from{box-shadow:0 0 3px #44cc88;}
  to{box-shadow:0 0 12px #44cc88,0 0 20px #44cc8844;}
}
.stNodeLabel{font-weight:bold;font-size:11px;margin-bottom:2px;}
.stNodeBonus{font-size:9px;color:#aaffcc;line-height:1.3;}
.stNodeCost{font-size:9px;color:#ffd700;margin-top:3px;}
.stRow{display:flex;justify-content:center;gap:4px;margin:3px 0;flex-wrap:wrap;}
.stArrow{text-align:center;color:#44cc88;font-size:13px;line-height:1.2;margin:1px 0;}
.stNode.locked_sp{border-color:#aa6600;background:#1a1000;color:#aa7700;cursor:pointer;}
.stStageHeader{
  font-size:11px;font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#1a1200,#2a2000,#1a1200);
  border:1px solid #443300;
  border-radius:6px;
  padding:3px 10px;
  margin:4px 0 2px;
  letter-spacing:1px;
}
.stStageHeader.done{color:#44cc88;border-color:#224422;background:linear-gradient(90deg,#0a1a0a,#112011,#0a1a0a);}
.stStageHeader.locked{color:#555;border-color:#333;background:#111;}
.spBadge{
  display:inline-block;
  background:linear-gradient(135deg,#1a3a1a,#0d2010);
  border:1px solid #44cc88;
  color:#88ffaa;
  border-radius:8px;
  padding:3px 10px;
  font-size:12px;
  font-weight:bold;
  margin:4px 0;
}

</style>
</head>

<body>
<!-- シリアルコードモーダル -->
<div id="serialModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);z-index:20000;justify-content:center;align-items:center;">
  <div style="background:#1a1f2e;border:2px solid #555;border-radius:16px;padding:28px 24px;max-width:320px;width:90%;text-align:center;position:relative;">
    <div style="font-size:18px;font-weight:bold;color:#aaa;margin-bottom:6px;letter-spacing:2px;">🔑 シリアルコード</div>
    <div style="font-size:12px;color:#666;margin-bottom:16px;">コードを入力してください</div>
    <input id="serialInput" type="text" placeholder="コードを入力..."
      style="width:80%;padding:10px 12px;border-radius:8px;border:1px solid #555;background:#0d1120;color:#fff;font-size:15px;letter-spacing:2px;text-align:center;outline:none;margin-bottom:14px;">
    <br>
    <button onclick="redeemSerial()" style="background:linear-gradient(135deg,#ffd700,#ff9800);color:#000;border:none;border-radius:8px;padding:10px 28px;font-size:15px;font-weight:bold;cursor:pointer;margin-right:8px;">交換</button>
    <button onclick="closeSerialModal()" style="background:#333;color:#aaa;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;">閉じる</button>
    <div id="serialMsg" style="margin-top:14px;font-size:14px;min-height:20px;"></div>
  </div>
</div>

<!-- 武器スキル/パッシブ確認モーダル -->
<div id="weaponModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;justify-content:center;align-items:center;">
  <div id="weaponModalBox" style="background:#1a1f2e;border:2px solid #aaddff;border-radius:14px;padding:20px 24px;max-width:320px;width:90%;text-align:center;position:relative;">
    <img id="weaponModalImg" src="" style="width:80px;height:80px;object-fit:cover;border-radius:10px;margin-bottom:8px;">
    <div id="weaponModalName" style="font-size:16px;font-weight:bold;margin-bottom:6px;"></div>
    <div id="weaponModalStats" style="font-size:12px;color:#aaa;margin-bottom:8px;"></div>
    <!-- タブ -->
    <div style="display:flex;gap:6px;margin-bottom:10px;justify-content:center;">
      <button id="wTabSkillBtn" onclick="switchWeaponTab('skill')"
        style="flex:1;padding:5px 0;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:bold;background:#aaddff;color:#000;">
        🗡 スキル
      </button>
      <button id="wTabPassiveBtn" onclick="switchWeaponTab('passive')"
        style="flex:1;padding:5px 0;border-radius:6px;border:1px solid #44cc44;cursor:pointer;font-size:12px;font-weight:bold;background:#1a2a1a;color:#88ff88;">
        🌟 パッシブ
      </button>
    </div>
    <!-- スキルタブ -->
    <div id="weaponSkillTabContent">
      <div id="weaponModalSkillText" style="font-size:14px;color:#aaddff;margin-bottom:6px;line-height:1.5;"></div>
      <div id="weaponModalCT" style="font-size:12px;color:#aaa;margin-bottom:12px;"></div>
    </div>
    <!-- パッシブタブ -->
    <div id="weaponPassiveTabContent" style="display:none;">
      <div id="weaponModalPassive" style="font-size:13px;color:#88ff88;line-height:1.6;padding:4px 0;"></div>
      <div id="weaponModalPassiveNone" style="font-size:13px;color:#888;display:none;">パッシブスキルなし</div>
    </div>
    <button onclick="closeWeaponModal()" style="background:#333;color:#fff;border:none;border-radius:8px;padding:6px 20px;cursor:pointer;font-size:14px;">閉じる</button>
  </div>
</div>

<!-- スキル確認モーダル -->
<div id="skillModal">
  <div id="skillModalBox">
    <img id="skillModalImg" src="">
    <div id="skillModalName"></div>
    <!-- タブ -->
    <div style="display:flex;gap:6px;margin-bottom:10px;justify-content:center;">
      <button id="tabSkillBtn" onclick="switchModalTab('skill')"
        style="flex:1;padding:5px 0;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:bold;background:#ffd700;color:#000;">
        🗡 スキル
      </button>
      <button id="tabPassiveBtn" onclick="switchModalTab('passive')"
        style="flex:1;padding:5px 0;border-radius:6px;border:1px solid #44cc44;cursor:pointer;font-size:12px;font-weight:bold;background:#1a2a1a;color:#88ff88;">
        🌟 パッシブ
      </button>
    </div>
    <!-- スキルタブ -->
    <div id="skillTabContent">
      <div id="skillModalText"></div>
      <div id="skillModalCT"></div>
    </div>
    <!-- パッシブタブ -->
    <div id="passiveTabContent" style="display:none;">
      <div id="skillModalPassive" style="font-size:13px;color:#88ff88;line-height:1.6;padding:4px 0;"></div>
      <div id="skillModalPassiveNone" style="font-size:13px;color:#888;display:none;">パッシブスキルなし</div>
    </div>
    <button id="skillModalClose" onclick="closeSkillModal()">閉じる</button>
  </div>
</div>

<!-- スキルツリーモーダル -->
<div id="skillTreeModal">
  <div id="skillTreeBox">
    <div style="font-size:15px;font-weight:bold;color:#44cc88;margin-bottom:10px;letter-spacing:1px;">🌳 スキルツリー</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;justify-content:center;">
      <img id="stCharImg" style="width:52px;height:52px;object-fit:cover;border-radius:8px;border:2px solid #44cc88;">
      <div style="text-align:left;">
        <div id="stCharName" style="font-size:14px;font-weight:bold;"></div>
        <div id="stSpDisplay" class="spBadge"></div>
      </div>
    </div>
    <div id="stTreeArea"></div>
    <div id="stMessage" style="font-size:12px;min-height:18px;margin-top:6px;"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
      <button onclick="resetSkillTree()" style="background:#3a1010;color:#ff6666;border:1px solid #883333;border-radius:8px;padding:6px 18px;cursor:pointer;font-size:12px;" id="stResetBtn">🔄 リセット</button>
      <button onclick="closeSkillTree()" style="background:#1a1f2e;color:#aaa;border:1px solid #444;border-radius:8px;padding:6px 22px;cursor:pointer;font-size:13px;">閉じる</button>
    </div>
  </div>
</div>

<div id="loading">
  <div class="loadingBox">
    <img src="https://imgur.com/5Olw81v.png" class="loadingLogo">
    <div class="loadingBar">
      <div id="loadingFill"></div>
    </div>
    <div class="loadingText">NOW LOADING...</div>
  </div>
</div>

<div id="title" class="screen active">
<h1><img src="https://imgur.com/5Olw81v.png" id="gameTitle"></h1>
<button onclick="go('gacha')">ガチャ</button>
<button onclick="go('party')">編成</button>
<button onclick="go('trial')">試練</button>
<button onclick="go('event')">イベントの間</button>
<button onclick="confirmReset()" style="opacity:0.6;font-size:12px;">
データリセット
</button>
</div>


<div id="gacha" class="screen">
石:<span id="stone"></span><br>

<!-- 🔥タブ -->
<div style="display:flex;justify-content:center;margin:10px;">
<button onclick="changeBanner(0)">通常</button>
<button onclick="changeBanner(1)">イベント</button>
<button onclick="changeBanner(2)">イベント2</button>

function applyTeamBuff(players){

let buff = getTeamBuff(players); // ←これ追加

return players.map(p=>{
    return {
        ...p,
        atk: Math.floor(p.atk * (1 + buff.atk / 100)),
        hp: Math.floor(p.hp * (1 + buff.hp / 100)),
        currentHp: Math.floor(p.hp * (1 + buff.hp / 100)),
        ult: 0,
        cool: 0,
        weaponCool: 0
    };
});
}

function saveData(){
const data = {
stone,
box,
team,
progress,
dupeStone,
sp,
eventProgress, // ←追加 // ←追加
weaponBox
};
localStorage.setItem("gachaData", JSON.stringify(data));
}

progress = data.progress ?? {};
dupeStone = data.dupeStone ?? 0;
sp = data.sp ?? 0;
eventProgress = data.eventProgress ?? {};
weaponBox = data.weaponBox ?? [];

}

function getGachaChar(){
let r = Math.random();

else if(r < 0.99)rarity = 3;
else rarity =4;

// 🔥通常キャラだけ
let pool = chars.filter(c=>c.rarity==rarity);

return pool[Math.random()*pool.length|0];
}

function sortBox(type){

if(type==="atk"){
box.sort((a,b)=>b.atk-a.atk);
}
else if(type==="hp"){
box.sort((a,b)=>b.hp-a.hp);
}
else if(type==="rarity"){
box.sort((a,b)=>b.rarity-a.rarity);
}
else if(type==="dupe"){
box.sort((a,b)=>b.dupe-a.dupe);
}
else if(type==="attr"){

const order = ["火","水","雷","木","光","闇"];

box.sort((a,b)=>{
return order.indexOf(a.attr) - order.indexOf(b.attr);
});

}

update();
}

function startBattle(i){
go("battle");

let lv = progress[i] || 1;

  players = applyTeamBuff(team.map(c=>{
    let base =
        chars.find(ch => ch.name === c.name) ||
        eventChars.find(ch => ch.name === c.name) ||
        eventChars2.find(ch => ch.name === c.name) ||
        eventChars3.find(ch => ch.name === c.name) ||
        eventChars4.find(ch => ch.name === c.name) ||
        eventChars5.find(ch => ch.name === c.name) ||
        eventChars6.find(ch => ch.name === c.name) ||
        eventChars7.find(ch => ch.name === c.name) ||
        eventChars8.find(ch => ch.name === c.name) ||
        eventChars9.find(ch => ch.name === c.name) ||
        rewardChar.find(ch => ch.name === c.name);

    let weapon = c.weapon;

let finalAtk = c.atk + (weapon?.atk || 0);
let finalHp = c.hp + (weapon?.hp || 0);

let initSkill = base?.skill || c.skill;
return {
    ...c,
    atk: finalAtk,
    hp: finalHp,
    currentHp: finalHp,
    skill: initSkill,
    skill2: base?.skill2 || c.skill2 || null,
    cool2: 0,
    weapon: c.weapon ? {...c.weapon} : null,
    weaponCool: 0,
    // 🔫 狙撃: 初期残弾6
    sniperAmmo: initSkill?.type === "sniper" ? (initSkill.maxAmmo || 6) : undefined,
    // ⚔ 神速の剣術: 初期剣カウント0
    swordCount: initSkill?.type === "kenSword" ? 0 : undefined,
    swordBuff: initSkill?.type === "kenSword" ? 0 : undefined, // 追加追撃強化ターン
    // 🌟 パッシブスキル初期化
    passive: base?.passive || c.passive || null,
    passiveAtkBonus: 0, // atk_up_on_attack スタック用
    kokuShoku: 0, // ⬛ 黒蝕スタックリセット
    // 🔫 武器パッシブをキャラパッシブと合成
    weaponPassive: c.weapon?.passive || null,
  };
  }));

// 敵はそのまま
  enemy={
      ...chars[i],
      hp: Math.floor(200+lv*120*lv/10),
      maxHp: Math.floor(200+lv*120*lv/10),
      atk: Math.floor(20+lv*50),
      poison:0,
      poisons:[],
      burnTurn:0, burnPower:0,
      burns:[], // 燃焼重ね掛け配列
      freezeTurn:0,
      shockTurn:0, shockPower:0,
      shield:0,
      debuffUsed:false,
      debuffPower: 1,
      debuffTurn: 0,
      debuffs:[], // デバフ重ね掛け配列
      erosions:[],
      gimmick: null,
      turnCount: 0
  };


turn="player";turnIndex=0;
deadPlayers=[];
lastAllySkill = null;
players.forEach(p => p.weaponCool = 0);

// 🌟 パッシブ: 戦闘開始時 敵ATK低下パッシブ適用
players.forEach(p => {
  let passives = [];
  if(p.passive) passives.push(p.passive);
  if(p.weaponPassive) passives.push(p.weaponPassive);
  passives.forEach(ps => {
    if(ps.type === "reduce_enemy_atk_passive"){
      enemy.atk = Math.floor(enemy.atk * (1 - ps.value));
      enemy.baseAtk = enemy.atk;
    }
  });
});

renderBattle();
}

function calcDamage(a,d,base){
if(advantage[a]===d)return {dmg:base*1.5,type:"weak"};
if(advantage[d]===a)return {dmg:base*0.5,type:"resist"};
return {dmg:base,type:""};
}

// ⬛ 侵蝕被ダメ増幅を適用（侵蝕1つにつき+25%）
function applyErosionBoost(res){
  if(!enemy.erosions || enemy.erosions.length === 0) return res;
  let boost = 1 + 0.25 * enemy.erosions.length;
  return { ...res, dmg: Math.floor(res.dmg * boost) };
}

// ⬛ 黒蝕スタック付与（状態異常が敵に付与されるたびに呼ぶ）
function triggerKokuShoku(count){
  count = count || 1;
  players.forEach(pl => {
    if(pl.passive && pl.passive.type === "koku_shoku"){
      let cur = pl.kokuShoku || 0;
      let next = Math.min(10, cur + count);
      if(next > cur){
        pl.kokuShoku = next;
        showSynergyText("⬛ " + pl.name + " 黒蝕+" + (next-cur) + "→" + next + "st！与ダメ+" + (next*12) + "% 被ダメ-" + (next*5) + "%");
      }
    }
  });
}

  }
  // ⚡ 桜木彰🎮 与ダメ回収ターン表示
  if(p.sakuraDrainTurn > 0){
    h += `<span class="sBadge" style="background:#6600cc;color:#fff;">⚡回収${p.sakuraDrainTurn}T</span>`;
  }
  if(p.statuses){
    p.statuses.forEach(s=>{
      if(s.type==="burn") h+=`<span class="sBadge sBurn">🔥燃${s.turn}</span>`;
      else if(s.type==="freeze") h+=`<span class="sBadge sFreeze">❄凍${s.turn}</span>`;
      else if(s.type==="shock") h+=`<span class="sBadge sShock">⚡感${s.turn}</span>`;
      else if(s.type==="poison") h+=`<span class="sBadge sPoison">☠毒${s.turn}</span>`;
    });
  }
  // シールド（重複スタック対応）
  if(p.shields && p.shields.length>0){
    let totalTurn = Math.max(...p.shields.map(s=>s.turn));
    let totalPower = Math.min(1, p.shields.reduce((acc,s)=>acc+s.power, 0));
    h+=`<span class="sBadge sShield">🛡×${p.shields.length}(${Math.floor(totalPower*100)}%/${totalTurn}T)</span>`;
  } else if(p.shield && p.shield.turn>0) h+=`<span class="sBadge sShield">🛡${p.shield.turn}</span>`;
  if(p.taunt && p.taunt.turn>0) h+=`<span class="sBadge" style="background:#ff8800;color:#fff;">🎯挑発${p.taunt.turn}</span>`;
  // 反撃（重複スタック対応）
  if(p.counterStackSlots && p.counterStackSlots.length>0){
    let rem = p.counterStackSlots.length;
    let pw = Math.floor(p.counterStackSlots[0].power * 100);
    h+=`<span class="sBadge sCounter">⚔スタック×${rem}(${pw}%)</span>`;
  }
  if(p.counters && p.counters.length>0){
    let totalTurn = Math.max(...p.counters.map(c=>c.turn));
    h+=`<span class="sBadge sCounter">⚔反×${p.counters.length}(${totalTurn}T)</span>`;
  } else if(p.counter && p.counter.turn>0) h+=`<span class="sBadge sCounter">⚔反${p.counter.turn}</span>`;
  if(p.buffs && p.buffs.length>0 && !p.buffs.every(b=>b.isHeatUp)) h+=`<span class="sBadge sBuff">↑バフ</span>`;
  // ヒートアップ表示（永続バフ中のみ）
  let _heatBuff = p.buffs && p.buffs.find(b=>b.isHeatUp);
  if(_heatBuff){
    let bonus = Math.floor((_heatBuff.power - 1) * 100);
    h += `<span class="sBadge" style="background:#ff6600;color:#fff;">🔥ヒートアップ+${bonus}%</span>`;
  } else if(p.skill && p.skill.type==="heatUp"){
    let turns = enemy.turnCount || 0;
    let bonus = Math.min(700, turns * 100);
    h += `<span class="sBadge" style="background:#333;color:#ff6600;">🔥ヒートアップ待機(発動で+${bonus}%)</span>`;
  }
  if(p.isBunshin) h+=`<span class="sBadge" style="background:#00ccff;color:#000;">👥分身(${p.bunshinTurn}T)</span>`;
  // 🌟 パッシブ表示
  if(p.passive){
    let shortText = p.passive.text ? p.passive.text.split("：")[0] : "パッシブ";
    h+=`<span class="sBadge sPassive">✦${shortText}</span>`;
  }
  // ⚔ 武器パッシブ表示
  if(p.weaponPassive){
    let shortText = p.weaponPassive.text ? p.weaponPassive.text.split("：")[0] : "武器パッシブ";
    h+=`<span class="sBadge" style="background:#1a2a3a;color:#aaddff;border:1px solid #4488cc;">⚔${shortText}</span>`;
  }
  if(p.timeCrash && p.timeCrash.turn >= 0){
    if(p.timeCrash.turn > 0){
      h+=`<span class="sBadge" style="background:#660099;color:#fff;">⏳時間崩壊(${p.timeCrash.turn}T 蓄:${Math.floor(p.timeCrash.stored||0)})</span>`;
    } else {
      h+=`<span class="sBadge" style="background:#330066;color:#aaa;">⏳崩壊待機(蓄:${Math.floor(p.timeCrash.stored||0)})</span>`;
    }
  }
  if(p.runawayBurn && p.runawayBurn.turn > 0){
    let mult = p.runawayBurn.doubled ? "×2" : "";
    h+=`<span class="sBadge" style="background:#ff2200;color:#fff;">🔥暴走燃焼(${p.runawayBurn.turn}T${mult})</span>`;
  }
  // 🌱 強制成長スタック表示
  if(p.growthStacks && p.growthStacks > 0){
    h+=`<span class="sBadge" style="background:#44cc44;color:#000;">🌱成長×${p.growthStacks}/5(ATK+${p.growthStacks*40}% HP+${p.growthStacks*5}%回復)</span>`;
  }
  // ⚡ 雷の鎧アクティブ表示
  if(p.thunderArmor){
    h+=`<span class="sBadge" style="background:#ffd700;color:#000;">⚡雷の鎧(永続)</span>`;
  }
  // 🗡 武器召喚残ターン表示
  if(p.weaponSummonTurn && p.weaponSummonTurn > 0){
    h+=`<span class="sBadge" style="background:#8888ff;color:#fff;">🗡武器召喚(${p.weaponSummonTurn}T)</span>`;
  }
  // 🎭 模倣者アクティブ表示
  if(p.mimicryActive){
    let _mRatio = 1 - (p.currentHp / p.hp);
    let _mBonus = Math.min(0.7, _mRatio * 0.7);
    h+=`<span class="sBadge" style="background:#cc88ff;color:#fff;">🎭模倣者(ATK&DEF+${Math.floor(_mBonus*100)}%)</span>`;
  }
  // ⬛ 黒蝕スタック表示
  if(p.kokuShoku && p.kokuShoku > 0){
    h+=`<span class="sBadge" style="background:#220022;color:#ff88ff;border:1px solid #880088;">⬛黒蝕×${p.kokuShoku}(与ダメ+${p.kokuShoku*12}% 被ダメ-${p.kokuShoku*5}%)</span>`;
  }
  // 💧 共鳴回復持続表示
  if(p.echoHeals && p.echoHeals.length > 0){
    let maxTurn = Math.max(...p.echoHeals.map(e=>e.turn));
    h+=`<span class="sBadge" style="background:#0066cc;color:#fff;">💧共鳴×${p.echoHeals.length}(${maxTurn}T HP+10%/T)</span>`;
  }
  return h;
}

function getEnemyStatusHTML(){
  let h="";
  if(enemy.poisons && enemy.poisons.length>0) h+=`<span class="sBadge sPoison">☠毒×${enemy.poisons.length}</span>`;
  if(enemy.burns && enemy.burns.length>0) h+=`<span class="sBadge sBurn">🔥燃${enemy.burns.length}重(${enemy.burnTurn}T)</span>`;
  else if(enemy.burnTurn>0) h+=`<span class="sBadge sBurn">🔥燃${enemy.burnTurn}</span>`;
  if(enemy.freezeTurn>0) h+=`<span class="sBadge sFreeze">❄凍${enemy.freezeTurn}</span>`;
  if(enemy.shockTurn>0) h+=`<span class="sBadge sShock">⚡感${enemy.shockTurn}</span>`;
  if(enemy.debuffs && enemy.debuffs.length>0) h+=`<span class="sBadge sDebuff">↓弱体${enemy.debuffs.length}重(${enemy.debuffTurn}T)</span>`;
  else if(enemy.debuffTurn>0) h+=`<span class="sBadge sDebuff">↓弱体${enemy.debuffTurn}</span>`;
  if(enemy.erosions && enemy.erosions.length>0) h+=`<span class="sBadge" style="background:#440044;color:#ff88ff;border:1px solid #aa44aa;">⬛侵蝕×${enemy.erosions.length}(${enemy.erosions[0]?.turn}T)</span>`;
  if(enemy.frozenCrystals && enemy.frozenCrystals.length>0) h+=`<span class="sBadge" style="background:#001a3a;color:#88eeff;border:1px solid #0088cc;">❄凍裂×${enemy.frozenCrystals.length} 蓄積:${Math.floor(enemy.frozenCrystalAccum||0)}</span>`;
  if(enemy.shield>0) h+=`<span class="sBadge sShield">🛡${Math.floor(enemy.shield)}</span>`;
  if(enemy.soundCrushAmp) h+=`<span class="sBadge" style="background:#ffcc00;color:#000;">⚡次の被ダメ×2</span>`;
  if(enemy.frozenPrison) h+=`<span class="sBadge" style="background:#001a3a;color:#66ccff;border:1px solid #0088cc;">❄凍裂(${enemy.frozenPrisonTurn||0}T・解除不能)</span>`;
  return h;
}

function getGimmickHTML(){
  if(!enemy.gimmick) return "";
  let g=enemy.gimmick;
  let h=`<div class="gimmickRow">`;
  if(g.shieldLabel) h+=`<span class="gBadge">${g.shieldLabel}</span>`;
  if(g.attrOnlyLabel) h+=`<span class="gBadge">${g.attrOnlyLabel}</span>`;
  if(g.turnLimitLabel){
    let rem=g.turnLimit-(enemy.turnCount||0);
    h+=`<span class="gBadge" style="color:${rem<=3?"#ff4444":"#ffd700"}">⏱残${rem}T</span>`;
  }
  if(g.turnBuffLabel) h+=`<span class="gBadge">${g.turnBuffLabel}</span>`;
  if(g.counterLabel) h+=`<span class="gBadge">${g.counterLabel}</span>`;
  if(g.phaseRageLabel) h+=`<span class="gBadge" style="color:${enemy.phaseRaged?"#ff4444":"#ffd700"}">${enemy.phaseRaged?"💀狂化中！":g.phaseRageLabel}</span>`;
  h+=`</div>`;
  return h;
}

function renderBattle(){
  let teamArea = document.getElementById("teamArea");
  let enemyArea = document.getElementById("enemyArea");

  teamArea.innerHTML = players.map((p,i)=>{
    let hpPct = Math.max(0,(p.currentHp/p.hp)*100);
    let coolPct = p.cool>0 ? Math.max(0,100-p.cool*(100/(p.skill?.cool||3))) : 100;
    let isReady = p.cool<=0;
    let cool2Pct = p.skill2 ? (p.cool2>0 ? Math.max(0,100-p.cool2*(100/(p.skill2?.cool||3))) : 100) : 0;
    let isReady2 = p.skill2 ? p.cool2<=0 : false;
    return `
  <div class="unit ally ${attrClass[p.attr]} ${i===turnIndex ? "turn" : ""}" id="p${i}">
    <img src="${p.img}">
    <span class="roleBadge ${getRoleClass(p.role)}">${getRoleLabel(p.role)}</span>
    ${p.name}
    <div class="statusRow">${getPlayerStatusHTML(p)}</div>
    <div>HP:${Math.floor(p.currentHp)}</div>
    <div class="bar"><div class="hp" style="width:${hpPct}%"></div></div>
    <div class="ctWrap">
      <span class="ctLabel">S1</span>
      <div class="ctBar"><div class="${isReady?"ctFillReady":"ctFill"}" style="width:${isReady?100:coolPct}%"></div></div>
    </div>
    ${p.skill2 ? `<div class="ctWrap">
      <span class="ctLabel">S2</span>
      <div class="ctBar"><div class="${isReady2?"ctFillReady":"ctFill"}" style="width:${isReady2?100:cool2Pct}%;background:linear-gradient(90deg,#cc44ff,#ff88ff);"></div></div>
    </div>` : ""}
    <div class="bar"><div class="gauge" style="width:${p.ult}%"></div></div>
  </div>`;
  }).join("")
  + (deadPlayers.length > 0 ? deadPlayers.map(p=>`
  <div class="unit ally" style="opacity:0.4;filter:grayscale(1);border:2px dashed #ff4444;">
    <img src="${p.img}">
    ${p.name}
    <div style="color:#ff4444;font-weight:bold;">💀 戦闘不能</div>
  </div>`).join("") : "");

  let hpPct2 = Math.max(0,(enemy.hp/enemy.maxHp)*100);
  enemyArea.innerHTML = `
<div class="unit enemy ${attrClass[enemy.attr]} ${turn==="enemy"?"turn":""}" id="enemy">
  <img src="${enemy.img}">
  ${enemy.name}
  <div class="statusRow">${getEnemyStatusHTML()}</div>
  ${getGimmickHTML()}
  <div>HP:${Math.floor(enemy.hp)}</div>
  <div class="bar"><div class="hp" style="width:${hpPct2}%"></div></div>
</div>`;

  let p = players[turnIndex];
  actions.innerHTML =
    turn==="player"
    ? `<button onclick="attack()">通常攻撃</button>
       <button onclick="skill()" ${(p.cool>0 || p.heatUpUsed || (p.skill?.type==="sniper" && (p.sniperAmmo??6)<=0))?"disabled":""}>
       スキル1 ${p.skill?.type==="sniper" ? "[🔫残弾"+(p.sniperAmmo??6)+"/6]" : p.heatUpUsed ? "[🔥ヒートアップ中]" : "(CT:"+p.cool+")"}${p.skill?.type==="chinkoPo" ? " [💢"+(p.chinkoPoCount||0)+"カウント]" : ""}${p.skill?.type==="kenSword" ? " [⚔剣×"+(p.swordCount||0)+"]" : ""}
       </button>
${p.skill2 ? `<button onclick="skill2()" ${(p.cool2>0 || (p.skill2.type==="bunshin" && players.some(pl=>pl.isBunshin)))?"disabled":""}>スキル2 (CT:${p.cool2})${p.skill2.type==="bunshin" && players.some(pl=>pl.isBunshin)?" [分身中]":""}</button>` : ""}
${p.weapon ? `<button onclick="weaponSkill()" ${(p.weaponCool??0)>0?"disabled":""}>武器スキル (CT:${p.weaponCool})</button>` : ""}
       <button onclick="ultimate()">必殺</button>`
    : "敵のターン";
}

function attack(){
let p=players[turnIndex];

let atk = p.atk;
if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

let res = calcDamage(p.attr,enemy.attr,atk);

// 🌟 パッシブ: 低HP時ATKブースト適用（自身 + パーティ全体の与ダメボーナス）
res.dmg = Math.floor(res.dmg * applyPassiveAtk(p));
// 🌟 パーティ全体パッシブ与ダメボーナス（状態異常系）
players.forEach(ally=>{
    if(ally === p) return;
    if(!ally.passive) return;
    let aps = ally.passive;
    // ✨ 光の歌声: 状態異常中の敵に与ダメ+20%
    if(aps.type==="heal_on_turn" && aps.text && aps.text.includes("与ダメ")){
        let hasAilment=(enemy.shockTurn>0)||(enemy.burns&&enemy.burns.length>0)||(enemy.poisons&&enemy.poisons.length>0);
        if(hasAilment) res.dmg=Math.floor(res.dmg*1.20);
    }
    // ⚡ 雷響: 感電中の敵への与ダメ+25%
    if(aps.type==="shock_on_attack" && aps.text && aps.text.includes("与ダメ")){
        if(enemy.shockTurn>0) res.dmg=Math.floor(res.dmg*1.25);
    }
});
if(enemy.allDebuffMark){
    res.dmg = Math.floor(res.dmg * 1.5);
}
// ⬛ 黒蝕: 与ダメブースト
let _kokuAtk = p.kokuShoku || 0;
if(_kokuAtk > 0) res.dmg = Math.floor(res.dmg * (1 + 0.12 * _kokuAtk));
// ⬛ 侵蝕: 被ダメ増幅
res = applyErosionBoost(res);

// ギミック: 属性制限（狂化後は全属性有効）
if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly){
  if(enemy.shield>0){
    // シールドには当てられる
  } else {
    res.dmg = Math.floor(res.dmg * 0.05);
  }
}

// シールド処理
if(enemy.shield>0){
  let absorbed=Math.min(enemy.shield, res.dmg);
  enemy.shield -= absorbed;
  res.dmg -= absorbed;
}

// ⚡ 轟音壊滅: 次の被ダメ2倍増幅(1回)
if(enemy.soundCrushAmp){
    res.dmg = Math.floor(res.dmg * 2);
    enemy.soundCrushAmp = false;
    showSynergyText("⚡ 轟音増幅！被ダメ×2！");
}

enemy.hp -= res.dmg;
applyShockBonus(p, atk);

// ❄ 凍裂蓄積: 凍裂中に与えたダメージをスタック数×30%ずつ蓄積
if(enemy.frozenPrison && enemy.frozenCrystals && enemy.frozenCrystals.length > 0 && res.dmg > 0){
  let accumAdd = Math.floor(res.dmg * 0.30 * enemy.frozenCrystals.length);
  enemy.frozenCrystalAccum = (enemy.frozenCrystalAccum || 0) + accumAdd;
}

// ⏳ 時間崩壊: 与えたダメージをパーティ全体で累積
let _tcHolder = players.find(pl => pl.timeCrash != null);
if(_tcHolder){
    _tcHolder.timeCrash.stored = (_tcHolder.timeCrash.stored || 0) + res.dmg;
}

// 🌟 パッシブ発動（攻撃時）
triggerAttackPassive(p);

// ⚡ 桜木彰🎮スキル: 与ダメ10%分HP回収（sakuraDrainTurn残留中）
if(p.sakuraDrainTurn && p.sakuraDrainTurn > 0 && res.dmg > 0){
  let drainHeal = Math.floor(res.dmg * 0.10);
  p.currentHp = Math.min(p.hp, p.currentHp + drainHeal);
  let _pi = players.indexOf(p);
  setTimeout(()=>showDamage("p"+(_pi>=0?_pi:turnIndex),{dmg:drainHeal,type:"heal"}),180);
}

renderBattle();

setTimeout(()=>{
    showDamage("enemy",res);
},10);

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

// 🔄 ギミック: counterカウンター（攻撃するたびに全体10%ダメージ）
if(enemy.gimmick?.counter && enemy.hp > 0){
  let cDmgRate = 0.10;
  players.forEach((t, ti)=>{
    if(t.currentHp <= 0) return;
    let cDmg = Math.floor(t.hp * cDmgRate);
    t.currentHp = Math.max(0, t.currentHp - cDmg);
    setTimeout(()=>{ showDamage("p"+ti, {dmg:cDmg, type:"burn"}); }, 350 + ti*80);
  });
  setTimeout(()=>showSynergyText("🔄 カウンター！全体HP-10%！"), 350);
  setTimeout(()=>renderBattle(), 500);
}



// 珍古砲カウント加算
if(p.skill && p.skill.type==="chinkoPo"){
    p.chinkoPoCount = Math.min(10, (p.chinkoPoCount||0) + 1);
}

// ⚔ 神速の剣術: 攻撃時に剣カウント+1、カウント分だけ追撃
if(p.skill && p.skill.type==="kenSword"){
    p.swordCount = (p.swordCount||0) + 1;
    let sc = p.swordCount;
    let followBonus = (p.swordBuff && p.swordBuff > 0) ? (p.skill.buffPower || 0.3) : 0;
    let totalFollowRate = (p.skill.power || 0.3) + followBonus;
    let followAtk = p.atk; if(p.buffs) p.buffs.forEach(b=>{ followAtk*=b.power; });
    for(let fi=0; fi<sc; fi++){
        let fdmg = Math.floor(followAtk * totalFollowRate);
        if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly) fdmg=Math.floor(fdmg*0.05);
        enemy.hp -= fdmg;
        let _fd = fdmg;
        setTimeout(()=>{ showDamage("enemy",{dmg:_fd,type:""}); }, 200 + fi*120);
    }
    if(sc>0){ showSynergyText("⚔ 神速の剣術！剣×"+sc+"追撃！"+(followBonus>0?"(強化中)":"")); renderBattle(); }
}

// 🔥 暴走燃焼: 攻撃時に全体燃焼(高倍率)付与
if(p.runawayBurn && p.runawayBurn.turn > 0){
    let burnPow = p.runawayBurn.doubled ? 1.2 : 0.6;
    if(!enemy.burns) enemy.burns = [];
    players.forEach(pl => {
        enemy.burns.push({ power: pl.atk * burnPow, turn: 3, user: pl });
    });
    enemy.burnPower = enemy.burns.reduce((acc, b) => acc + b.power, 0);
    enemy.burnTurn = Math.max(...enemy.burns.map(b => b.turn));
    showSynergyText("🔥 暴走燃焼：全体に燃焼付与！");
}

p.ult+=30;

// 🌱 強制成長: 通常攻撃時にもスタック付与&HP回復
if(p.skill && p.skill.type==="growthStrike"){
    let curStacks = p.growthStacks || 0;
    if(curStacks < 5){
        p.growthStacks = curStacks + 1;
        let newStacks = p.growthStacks;
        if(!p.buffs) p.buffs = [];
        p.buffs = p.buffs.filter(b => !b.isGrowth);
        let growthPower = 1 + newStacks * 0.4;
        p.buffs.push({ power: growthPower, turn: 999999, permanent: true, isGrowth: true });
        let healAmt = p.hp * (newStacks * 0.05); // 成長スタック数×5%
        p.currentHp = Math.min(p.hp, p.currentHp + healAmt);
        let pi2 = players.indexOf(p);
        setTimeout(()=>showDamage("p"+(pi2>=0?pi2:turnIndex), {dmg:healAmt, type:"heal"}), 200);
        showSynergyText("🌱 成長！スタック" + newStacks + "/5 HP+" + (newStacks*5) + "%回復");
    } else {
        let healAmt = p.hp * (curStacks * 0.05); // 成長スタック数×5%（MAX5スタック=25%）
        p.currentHp = Math.min(p.hp, p.currentHp + healAmt);
        let pi2 = players.indexOf(p);
        setTimeout(()=>showDamage("p"+(pi2>=0?pi2:turnIndex), {dmg:healAmt, type:"heal"}), 200);
        showSynergyText("🌱 成長MAX！HP" + (curStacks*5) + "%回復！");
    }
    renderBattle();
}

// ⚡ 雷の鎧: 通常攻撃時に感電付与
if(p.thunderArmor){
    enemy.shockTurn = Math.max(enemy.shockTurn||0, 2);
    showSynergyText("⚡ 雷の鎧：感電付与！");
}

// 🗡 武器召喚: 攻撃時にランダム追加デバフ付与
if(p.weaponSummonTurn && p.weaponSummonTurn > 0){
    let debufTypes = ["poison", "burn", "shock"];
    let chosen = debufTypes[Math.floor(Math.random()*3)];
    if(chosen==="poison"){
        if(!enemy.poisons) enemy.poisons = [];
        enemy.poisons.push({ power: 0.3, turn: 3, user: p });
        showSynergyText("🗡 武器召喚：毒付与！");
    } else if(chosen==="burn"){
        if(!enemy.burns) enemy.burns = [];
        enemy.burns.push({ power: p.atk * 0.3, turn: 3, user: p });
        enemy.burnPower = enemy.burns.reduce((acc,b)=>acc+b.power,0);
        enemy.burnTurn = Math.max(...enemy.burns.map(b=>b.turn));
        showSynergyText("🗡 武器召喚：燃焼付与！");
    } else {
        enemy.shockTurn = Math.max(enemy.shockTurn||0, 2);
        showSynergyText("🗡 武器召喚：感電付与！");
    }
}

// 🎭 模倣者パッシブ: 毎攻撃時にバフ再計算（永続・ATKのみ）最低+10%保証
if(p.mimicryActive){
    let ratio = 1 - (p.currentHp / p.hp);
    let bonus = Math.min(0.7, 0.1 + ratio * 0.6);
    if(!p.buffs) p.buffs = [];
    p.buffs = p.buffs.filter(b => !b.isMimicry);
    p.buffs.push({ power: 1 + bonus, turn: 999999, permanent: true, isMimicry: true });
}

// 🎭 模倣者パッシブ: スキル未使用でも自動有効化
if(p.skill && p.skill.type==="mimicry" && !p.mimicryActive){
    p.mimicryActive = true;
}

endTurn();
}

function ultimate(){
let p = players[turnIndex];
if(p.ult < 100) return;

let atk = p.atk;

if(p.buffs){
    p.buffs.forEach(b=>{
        atk *= b.power;
    });
}

let res = calcDamage(p.attr, enemy.attr, atk * 3);
if(enemy.gimmick?.attrOnly && !enemy.phaseRaged && p.attr!==enemy.gimmick.attrOnly && enemy.shield<=0) res.dmg=Math.floor(res.dmg*0.05);
if(enemy.shield>0){ let ab=Math.min(enemy.shield,res.dmg); enemy.shield-=ab; res.dmg-=ab; }
// ⬛ 黒蝕与ダメ・侵蝕被ダメブースト
let _ksU = p.kokuShoku||0; if(_ksU>0) res.dmg=Math.floor(res.dmg*(1+0.12*_ksU));
res = applyErosionBoost(res);
enemy.hp -= res.dmg;
applyShockBonus(p, atk);

p.ult = 0;

let flash=document.createElement("div");
flash.className="rainbowFlash";
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),600);

renderBattle();

setTimeout(()=>{
    showDamage("enemy", {
        dmg: res.dmg,
        type: "ultimate"
    });
},10);

// 🔥 ここ変更
if(enemy.hp <= 0){
    setTimeout(()=>win(), 600);
    return;
}

// 珍古砲カウント加算
if(p.skill && p.skill.type==="chinkoPo"){
    p.chinkoPoCount = Math.min(10, (p.chinkoPoCount||0) + 1);
}

// ⚔ 神速の剣術: 必殺後も追撃
if(p.skill && p.skill.type==="kenSword"){
    p.swordCount = (p.swordCount||0) + 1;
    let sc = p.swordCount;
    let followBonus = (p.swordBuff && p.swordBuff > 0) ? (p.skill.buffPower || 0.3) : 0;
    let totalFollowRate = (p.skill.power || 0.3) + followBonus;
    let followAtk = p.atk; if(p.buffs) p.buffs.forEach(b=>{ followAtk*=b.power; });
    for(let fi=0; fi<sc; fi++){
        let fdmg = Math.floor(followAtk * totalFollowRate);
        enemy.hp -= fdmg;
        let _fd = fdmg;
        setTimeout(()=>{ showDamage("enemy",{dmg:_fd,type:""}); }, 700 + fi*120);
    }
    if(sc>0){ showSynergyText("⚔ 神速の剣術！剣×"+sc+"追撃！"+(followBonus>0?"(強化中)":"")); renderBattle(); }
}

endTurn();
}

function checkSynergy(p, atk){

  if(enemy.poisons && enemy.poisons.length>0 && enemy.burnTurn>0){
    let expDmg = atk * 3;
    enemy.hp -= expDmg;
    enemy.poisons = [];
    enemy.burnTurn = 0;
    setTimeout(()=>{
      showSynergyText("💥 毒×炎 シナジー！爆発！");
      showDamage("enemy",{dmg:expDmg, type:"synergy"});
    },200);
    return;
  }
  // 感電 + 毒 → 毒ダメ即時爆発
  if(enemy.shockTurn>0 && enemy.poisons && enemy.poisons.length>0){

    enemy.hp -= bonusDmg;
    enemy.shockTurn = 0;

function applyShockBonus(p, atk){
  if(enemy.shockTurn>0){

    }
    enemy.hp -= bonusDmg;
    enemy.shockTurn--;
    setTimeout(()=>showDamage("enemy",{dmg:bonusDmg,type:"shock"}),150);
  }
}

function applyEnemyStatusDamage(callback){
  let delay = 0;

  // 毒（重ね掛け）
  if(enemy.poisons && enemy.poisons.length>0){
    enemy.poisons = enemy.poisons.filter(poison=>{
      let atk2 = poison.user.atk;
      if(poison.user.buffs) poison.user.buffs.forEach(b=>{ atk2*=b.power; });
      let dmg = atk2 * poison.power;
      // 🌟 パッシブ: 毒ダメ増幅
      players.forEach(pl=>{
        if(pl.passive && pl.passive.type==="poison_power_up") dmg *= (1 + pl.passive.value);
      });
      dmg *= getAilmentTreeBonus();
      enemy.hp -= dmg;
      setTimeout(()=>showDamage("enemy",{dmg,type:"poison"}), delay);
      delay+=100;
      poison.turn--;
      return poison.turn>0;
    });
  }

  // 燃焼（重ね掛け対応）
  if(enemy.burns && enemy.burns.length > 0){
    enemy.burns = enemy.burns.filter(b => {
        enemy.hp -= b.power;
        setTimeout(()=>showDamage("enemy",{dmg:b.power,type:"burn"}), delay);
        delay += 80;
        b.turn--;
        return b.turn > 0;
    });
    enemy.burnPower = enemy.burns.reduce((acc, b) => acc + b.power, 0);
    enemy.burnTurn = enemy.burns.length > 0 ? Math.max(...enemy.burns.map(b=>b.turn)) : 0;
  } else if(enemy.burnTurn > 0){
    let bDmg = enemy.burnPower;
    enemy.hp -= bDmg;
    setTimeout(()=>showDamage("enemy",{dmg:bDmg,type:"burn"}), delay);
    delay+=100;
    enemy.burnTurn--;
  }

  // ⬛ 侵蝕: ターン毎に最大HP4%ダメージ & ターン減少
  if(enemy.erosions && enemy.erosions.length > 0){
    enemy.erosions = enemy.erosions.filter(er => {
      let dotDmg = Math.floor((er.maxHp || enemy.hp) * er.maxHpDot);
      enemy.hp -= dotDmg;
      setTimeout(()=>showDamage("enemy",{dmg:dotDmg,type:"poison"}), delay);
      delay += 80;
      er.turn--;
      return er.turn > 0;
    });
    if(enemy.erosions.length > 0){
      showSynergyText("⬛ 侵蝕ダメージ！×" + enemy.erosions.length + "重");
    }
  }

  // ❄ 凍裂: DoTなし。蓄積中テキストのみ表示（爆砕は期限切れ時に発動）
  if(enemy.frozenCrystals && enemy.frozenCrystals.length > 0){
    showSynergyText("❄ 凍裂固定中×" + enemy.frozenCrystals.length + "スタック！蓄積:" + Math.floor(enemy.frozenCrystalAccum||0) + "！");
  }

  setTimeout(()=>{
    // 反撃（重複スタック対応）
    players.forEach(t=>{
      // counterStackSlots方式（1回ずつ消費）
      if(t.counterStackSlots && t.counterStackSlots.length > 0){
        let slot = t.counterStackSlots.shift(); // 1スロット消費
        let res2 = calcDamage(t.attr, enemy.attr, t.atk * slot.power);
        enemy.hp -= res2.dmg;
        let rem = t.counterStackSlots.length;
        let pwPct = Math.floor(slot.power * 100);
        setTimeout(()=>{
          showDamage("enemy", {...res2, type:"ultimate"});
          showSynergyText("⚔ カウンター反撃！" + pwPct + "% 残" + rem + "回");
        }, 50);
      }
      // 新配列スタック方式
      if(t.counters && t.counters.length>0){
        t.counters.forEach(ct=>{
          let res2=calcDamage(t.attr,enemy.attr,t.atk*ct.power);
          enemy.hp-=res2.dmg;
          setTimeout(()=>showDamage("enemy",{...res2,type:"weak"}),50);
        });
        t.counters = t.counters.filter(ct=>{ ct.turn--; return ct.turn>0; });
      }
      // 旧方式（後方互換）
      else if(t.counter && t.counter.turn>0){
        let res2=calcDamage(t.attr,enemy.attr,t.atk*t.counter.power);
        enemy.hp-=res2.dmg;
        setTimeout(()=>showDamage("enemy",{...res2,type:"weak"}),50);
        t.counter.turn--;
      }
    });
    if(enemy.hp<=0){ setTimeout(()=>win(),500); return; }
    if(callback) callback();
  }, delay+100);
}

function checkTurnLimit(){
  if(!enemy.gimmick?.turnLimit) return;
  let rem = enemy.gimmick.turnLimit - (enemy.turnCount||0);
  if(rem<=0 && enemy.hp>0){
    alert("⏱ ターン制限超過！敗北...");
    if(currentEvent!==undefined){ currentEvent=undefined; go("event"); }
    else go("trial");
  }
}

// ===== 🌟 パッシブスキル処理 =====

// 攻撃時パッシブ発動
function triggerAttackPassive(p){
  // キャラパッシブと武器パッシブ両方に対して処理
  let passives = [];
  if(p.passive) passives.push({ps: p.passive, label: p.name});
  if(p.weaponPassive) passives.push({ps: p.weaponPassive, label: p.weapon?.name || "武器"});

  passives.forEach(({ps, label})=>{
  // 🔥 burn_on_attack: 確率で燃焼付与
  if(ps.type === "burn_on_attack" && Math.random() < ps.chance){
    if(!enemy.burns) enemy.burns = [];
    enemy.burns.push({power: p.atk * ps.power, turn: ps.turn||2, user: p});
    enemy.burnPower = enemy.burns.reduce((acc,b)=>acc+b.power,0);
    enemy.burnTurn = Math.max(...enemy.burns.map(b=>b.turn));
    showSynergyText("🔥 "+label+"のパッシブ！燃焼付与！");
    triggerKokuShoku(1);
  }
  // ⚡ shock_on_attack: 確率で感電付与
  if(ps.type === "shock_on_attack" && Math.random() < ps.chance){
    enemy.shockTurn = Math.max(enemy.shockTurn||0, 2);
    showSynergyText("⚡ "+label+"のパッシブ！感電付与！");
    triggerKokuShoku(1);
  }
  // ☠ poison_on_attack: 確率で毒付与
  if(ps.type === "poison_on_attack" && Math.random() < ps.chance){
    if(!enemy.poisons) enemy.poisons = [];

  }

  if(ps.type === "himo_passive"){

    showSynergyText("🔗 "+label+"のパッシブ！攻撃→紐カウント→"+p.himoCount+"！被ダメ-"+(Math.min(45,p.himoCount*3))+"%！");
  }
  }); // end passives.forEach
  // ツリー追加パッシブ（攻撃時）
  triggerTreePassiveOnAttack(p);
  // ⚡ sakuraBoost: 与ダメの10%分HP回復（sakuraDrainTurnが残っている間）
  if(p.sakuraDrainTurn && p.sakuraDrainTurn > 0){
    // 実際の回収はatk計算後に呼ばれるのでここでは基礎ATKから推定
    // ※ showDamage後に回収するためendTurn側でも処理
  }
}

// ターン開始時パッシブ (味方全体に適用)
function triggerTurnStartPassive(){
  players.forEach((p, pi)=>{
    if(!p.passive) return;
    let ps = p.passive;

    // 🌿 heal_on_turn: ターン毎に味方全体HP回復
    if(ps.type === "heal_on_turn"){
      players.forEach((target, ti)=>{
        if(target.currentHp <= 0) return;
        let healAmt = Math.floor(target.hp * ps.value);
        target.currentHp = Math.min(target.hp, target.currentHp + healAmt);
        setTimeout(()=>showDamage("p"+ti,{dmg:healAmt,type:"heal"}), ti*80);
      });
    }
    // 💪 atk_up_on_turn: ターン毎に味方全体ATKバフ(短期)
    if(ps.type === "atk_up_on_turn"){
      players.forEach((target)=>{
        if(!target.buffs) target.buffs = [];
        target.buffs.push({power: 1 + ps.value, turn: 1, isPassiveTurnBuff: true});
      });
    }
    // 🔥 hpcut_regen: ターン毎に味方全体HP5%回復 + 敵HP4%カット (晴海亨🎮パッシブ)
    if(ps.type === "hpcut_regen"){
      // 味方全体HP回復
      players.forEach((target, ti)=>{
        if(target.currentHp <= 0) return;
        let healAmt = Math.floor(target.hp * (ps.value||0.05));
        target.currentHp = Math.min(target.hp, target.currentHp + healAmt);
        setTimeout(()=>showDamage("p"+ti,{dmg:healAmt,type:"heal"}), ti*80);
      });
      // 敵HPカット
      if(enemy && enemy.hp > 0){
        let cutDmg = Math.floor(enemy.maxHp * (ps.cutRate||0.04));
        enemy.hp = Math.max(0, enemy.hp - cutDmg);
        setTimeout(()=>{ showDamage("enemy",{dmg:cutDmg,type:""}); showSynergyText("🔥 "+p.name+"のパッシブ！全体回復＋敵HP4%カット！"); }, 200);
      }
    }
    // 💧 revive_passive: 瀕死味方の応急回復
    if(ps.type === "revive_passive"){
      players.forEach((target, ti)=>{
        if(target.currentHp > 0 && target.currentHp < target.hp && (target.currentHp / target.hp) <= ps.threshold){
          let healAmt = Math.floor(target.hp * 0.15);
          target.currentHp = Math.min(target.hp, target.currentHp + healAmt);
          setTimeout(()=>{
            showDamage("p"+ti,{dmg:healAmt,type:"heal"});
            showSynergyText("💧 "+p.name+"のパッシブ！瀕死の味方を回復！");
          }, 100);
        }
      });
    }
  });
}

// 被ダメ時パッシブ (攻撃を受けた味方に適用)
function triggerDamagedPassive(target){
  // HP0以下のキャラには回復パッシブを発動しない
  if(target.currentHp <= 0) return;
  // heal_on_damaged: 味方が被ダメ時に全体回復
  players.forEach((p)=>{
    if(!p.passive) return;
    if(p.passive.type === "heal_on_damaged"){
      let healAmt = Math.floor(target.hp * p.passive.value);
      target.currentHp = Math.min(target.hp, target.currentHp + healAmt);
      let ti = players.indexOf(target);
      if(ti>=0) setTimeout(()=>showDamage("p"+ti,{dmg:healAmt,type:"heal"}),300);
    }
    // ⚡ 桜木彰🎮パッシブ: 被ダメ時ATK+50%(3T) + HP5%回復
    if(p === target && p.passive.type === "dmg_on_damaged_buff"){
      if(!p.buffs) p.buffs=[];
      p.buffs.push({ power: 1 + (p.passive.value||0.5), turn: 3, isDmgOnDamagedBuff: true });
      let healAmt = Math.floor(p.hp * (p.passive.healRate||0.05));
      p.currentHp = Math.min(p.hp, p.currentHp + healAmt);
      let ti = players.indexOf(p);
      if(ti>=0) setTimeout(()=>showDamage("p"+ti,{dmg:healAmt,type:"heal"}),350);
      showSynergyText("⚡ "+p.name+"のパッシブ！被ダメ→ATK+50%(3T)＋HP回復！");
    }
    // 🔗 八並解徒🎮パッシブ: 被ダメ時に紐カウント+1
    if(p === target && p.passive.type === "himo_passive"){
      p.himoCount = Math.min(15, (p.himoCount||0) + 1);
      showSynergyText("🔗 "+p.name+"のパッシブ！被ダメ→紐カウント→"+p.himoCount+"！");
    }
  });
  // ツリーパッシブ: 反撃の炎
  triggerTreePassiveOnDamaged(target);
}

// ATK計算時にパッシブ補正適用 (dmg_boost_low_hp, tank_passive, etc)
function applyPassiveAtk(p){
  let bonus = 1.0;
  let passives = [];
  if(p.passive) passives.push(p.passive);
  if(p.weaponPassive) passives.push(p.weaponPassive);
  passives.forEach(ps=>{
    // 低HP時ATKブースト
    if(ps.type === "dmg_boost_low_hp"){
      if((p.currentHp / p.hp) <= ps.threshold){
        bonus *= (1 + ps.value);
      }
    }
    // ✨ 光の歌声(heal_on_turn): 状態異常中の敵に与ダメ+20%
    if(ps.type === "heal_on_turn" && ps.text && ps.text.includes("与ダメ")){
      let hasAilment = (enemy.shockTurn>0) || (enemy.burns && enemy.burns.length>0) || (enemy.poisons && enemy.poisons.length>0);
      if(hasAilment) bonus *= 1.20;
    }
    // ⚡ 雷響(shock_on_attack): 感電中の敵への与ダメ+25%
    if(ps.type === "shock_on_attack" && ps.text && ps.text.includes("与ダメ")){
      if(enemy.shockTurn > 0) bonus *= 1.25;
    }
  });
  // ツリー追加パッシブのATK補正
  bonus *= applyTreePassiveAtk(p);
  return bonus;
}
function applyPassiveDef(target){
  let reduction = 1.0;
  let passives = [];
  if(target.passive) passives.push(target.passive);
  if(target.weaponPassive) passives.push(target.weaponPassive);
  passives.forEach(ps=>{
    if(ps.type === "tank_passive"){
      reduction *= (1 - ps.value);
    }
    // 🔗 八並解徒🎮パッシブ: 紐カウント1につき被ダメ3%軽減
    if(ps.type === "himo_passive" && target.himoCount > 0){
      let himoReduction = Math.min(0.45, target.himoCount * 0.03); // 最大15カウント→45%軽減上限
      reduction *= (1 - himoReduction);
    }
  });
  // ツリー追加パッシブの被ダメ軽減
  reduction *= applyTreePassiveDef(target);
  return reduction;
}

// ===== パッシブスキル処理ここまで =====

// ===== スキルダメージへのパッシブ補正適用 =====
// スキルで敵にダメージを与えるとき、パーティ全体の与ダメパッシブを一括適用する
function applySkillDmgPassives(dmg, attacker){
  let mult = 1.0;
  players.forEach(ally=>{
    let passives = [];
    if(ally.passive) passives.push(ally.passive);
    if(ally.weaponPassive) passives.push(ally.weaponPassive);
    passives.forEach(ps=>{
      // 低HP時ATKブースト（自身のみ）
      if(ally === attacker && ps.type === "dmg_boost_low_hp"){
        if((ally.currentHp / ally.hp) <= ps.threshold) mult *= (1 + ps.value);
      }
      // ✨ 光の歌声: 状態異常中の敵に与ダメ+20%（パーティ全体）
      if(ps.type === "heal_on_turn" && ps.text && ps.text.includes("与ダメ")){
        let hasAilment = (enemy.shockTurn>0)||(enemy.burns&&enemy.burns.length>0)||(enemy.poisons&&enemy.poisons.length>0);
        if(hasAilment) mult *= 1.20;
      }
      // ⚡ 雷響: 感電中の敵への与ダメ+25%（パーティ全体）
      if(ps.type === "shock_on_attack" && ps.text && ps.text.includes("与ダメ")){
        if(enemy.shockTurn > 0) mult *= 1.25;
      }
    });
  });
  // ツリー: スキル威力強化 (攻撃者本人のtreeSkillPowerを適用)
  let ac = box.find(b=>b.name===attacker.name);
  if(ac && ac.treeSkillPower) mult *= (1 + ac.treeSkillPower);
  // ツリー: ツリーパッシブATK補正（属性共鳴・不屈・滅亡の刻など）も反映
  mult *= applyTreePassiveAtk(attacker);
  return Math.floor(dmg * mult);
}

function endTurn(){
if(turn === "enemy"){

    // デバフスタックのターン減少
    if(enemy.debuffs && enemy.debuffs.length > 0){
        enemy.debuffs = enemy.debuffs.filter(d=>{ d.turn--; return d.turn>0; });
        if(enemy.debuffs.length > 0){
            enemy.debuffPower = enemy.debuffs.reduce((acc,d)=>acc*d.power, 1);
            enemy.debuffTurn = Math.max(...enemy.debuffs.map(d=>d.turn));
        } else {
            enemy.debuffPower = 1;
            enemy.debuffTurn = 0;
        }
    } else if(enemy.debuffTurn > 0){
        enemy.debuffTurn--;
        if(enemy.debuffTurn <= 0) enemy.debuffPower = 1;
    }
}

let p = players[turnIndex];

if(p.buffs){
    p.buffs = p.buffs.filter(b=>{
        if(b.permanent) return true;
        b.turn--;
        return b.turn > 0;
    });
}

if(p.cool > 0) p.cool--;
if(p.cool2 > 0) p.cool2--;
if(p.weaponCool > 0) p.weaponCool--;
if(p.taunt && p.taunt.turn > 0){ p.taunt.turn--; if(p.taunt.turn<=0) p.taunt=null; }
// ⚡ 桜木彰🎮: sakuraDrainTurnのターン経過
if(p.sakuraDrainTurn && p.sakuraDrainTurn > 0){ p.sakuraDrainTurn--; }

// 🔥 暴走燃焼: 毎ターンHP10%減少、ターン経過でバフ解除
if(p.runawayBurn && p.runawayBurn.turn > 0){
    let dmgRate = p.runawayBurn.doubled ? 0.2 : 0.1;
    let selfDmg = Math.floor(p.hp * dmgRate);
    p.currentHp -= selfDmg;
    if(p.currentHp < 1) p.currentHp = 1;
    let selfIdx = players.indexOf(p);
    setTimeout(()=>showDamage("p"+(selfIdx >= 0 ? selfIdx : turnIndex), {dmg:selfDmg, type:"burn"}), 10);
    p.runawayBurn.turn--;
    if(p.runawayBurn.turn <= 0){
        p.buffs = p.buffs ? p.buffs.filter(b => !b.isRunawayBurn) : [];
        p.runawayBurn = null;
    }
}

if(enemy.hp <= 0){
    setTimeout(()=>win(), 500);
    return;
}

turnIndex++;
if(turnIndex>=players.length){
turn="enemy";
setTimeout(enemyTurn,700);
turnIndex=0;
}
renderBattle();
}

function win(){

    // ⭐ イベント中ならイベント処理
    if(currentEvent !== undefined){
        Eventwin();
        return;
    }

    // ⭐ 通常の試練
    stone+=10;
    sp += 5; // スキルポイント+5
    let id=chars.findIndex(c=>c.name===enemy.name);
    progress[id]=(progress[id]||1)+1;
    saveData();
    alert("勝利！石+10 / SP+5");
    go("trial");
}

}

    res.dmg = applySkillDmgPassives(res.dmg, p);

    enemy.hp -= res.dmg;

    setTimeout(()=>showDamage("enemy", res),10);
  showSynergyText("超ダメージ！");
}

// 🔥 多段（←ここが一番重要）
if(s.type==="multi"){

function useDupe(i){
    let c = box[i];

    if(c.dupe >= maxDupe[c.rarity]){
        alert("これ以上凸できない");
        return;
    }

    let cost = 0;

    if(c.rarity === 1) cost = 5;
    if(c.rarity === 2) cost = 10;
    if(c.rarity === 3) cost = 30;
    if(c.rarity === 4) cost = 100;

    if(dupeStone < cost){
        alert("凸塊が足りない");
        return;
    }

    dupeStone -= cost;
    c.dupe++;

    let atkUp=0,hpUp=0;

    if(c.rarity===1){
        atkUp=20; hpUp=50;
    }else if(c.rarity===2){
        atkUp=25; hpUp=62;
    }else if(c.rarity===3){
        atkUp=32; hpUp=80;
    }else if(c.rarity===4){
        atkUp=72; hpUp=184;
    }

    // スキルツリーで既に % ボーナスが適用されている場合、
    // 凸上昇値にも同じ倍率をかけて「ツリー前後の順序」による差をなくす
    let treeAtkMult = 1.0;
    let treeHpMult  = 1.0;
    if(c.skillTreeData){
        c.skillTreeData.chosen.forEach(id => {
            let ch = stNodeMap[id];
            if(ch && ch.type === "bonus"){
                if(ch.bonus.atk) treeAtkMult *= (1 + ch.bonus.atk);
                if(ch.bonus.hp)  treeHpMult  *= (1 + ch.bonus.hp);
            }
        });
    }
    atkUp = Math.round(atkUp * treeAtkMult);
    hpUp  = Math.round(hpUp  * treeHpMult);

    c.atk += atkUp;
    c.hp += hpUp;

    update();
    saveData();
}

function startEventBattle(i){
go("battle");

let e = eventStages[i];
let prog = eventProgress[i] || 1;

// ステージ取得
let stage = e.stages[prog-1];

// 味方
players = applyTeamBuff(team.map(c=>{
    let base =
        chars.find(ch => ch.name === c.name) ||
        eventChars.find(ch => ch.name === c.name) ||
        eventChars2.find(ch => ch.name === c.name) ||
        eventChars3.find(ch => ch.name === c.name) ||
        eventChars4.find(ch => ch.name === c.name) ||
        eventChars5.find(ch => ch.name === c.name) ||
        eventChars6.find(ch => ch.name === c.name) ||
        eventChars7.find(ch => ch.name === c.name) ||
        eventChars8.find(ch => ch.name === c.name) ||
        eventChars9.find(ch => ch.name === c.name) ||
        rewardChar.find(ch => ch.name === c.name);

    let weapon = c.weapon;

    let finalAtk = c.atk + (weapon?.atk || 0);
    let finalHp = c.hp + (weapon?.hp || 0);

    return {
        ...c,
        atk: finalAtk,
        hp: finalHp,
        currentHp: finalHp,
        skill: base?.skill || c.skill,
        skill2: base?.skill2 || c.skill2 || null,
        cool2: 0,
        weapon: c.weapon ? {...c.weapon} : null,
        weaponCool: 0,
        debuffPower: 1, // 通常は1倍
        debuffTurn: 0,  // 残りターン
        weaponPassive: c.weapon?.passive || null,
    };
}));

// 敵
enemy = {
    attr: e.enemy.attr ?? "neutral",
    ...e.enemy,
    hp: stage.hp,
    maxHp: stage.hp,
    atk: stage.atk ?? e.enemy.atk ?? 10,
    baseAtk: stage.atk ?? e.enemy.atk ?? 10,
    poison:0,
    poisons:[],
    burnTurn:0, burnPower:0,
    freezeTurn:0,
    shockTurn:0, shockPower:0,
    shield: stage.gimmick?.shield || 0,
    debuffUsed:false,
    debuffPower: 1,
    debuffTurn: 0,
    erosions: [],
    frozenCrystals: [],
    frozenCrystalAccum: 0,
    gimmick: stage.gimmick || null,
    turnCount: 0,
    turnBuffStacks: 0
};

// ボス演出（任意）
if(stage.boss){
    alert("⚠️ボス出現！！");
}

turn="player";
turnIndex=0;
deadPlayers=[];

currentEvent = i;

renderBattle();
}

function Eventwin(){

if(currentEvent !== undefined){

    let prog = eventProgress[currentEvent] || 1;
    let e = eventStages[currentEvent];

    // 🔥 初回クリア判定
    if(!eventProgress["clear_"+currentEvent]){

        // ★毎回報酬 → 初回だけに変更
        stone += e.reward;
        sp += 3; // イベントステージSP+3

    }

    prog++;

    if(prog > e.stages.length){

        alert("🎉イベント完全制覇！");

        // 🔥 初回のみ
        if(!eventProgress["clear_"+currentEvent]){

            // ボス報酬
            stone += e.bossReward || 0;
            sp += 10; // イベント完全制覇SP+10

            // キャラ報酬
            let rewardChar = e.rewardChar;
            if(rewardChar){
                addToBox(rewardChar);
                alert("新キャラGET！！「" + rewardChar.name + "」");
            }

            // クリアフラグ
            eventProgress["clear_"+currentEvent] = true;
        }

        prog = e.stages.length;

    }else{
        alert("ステージクリア！");
    }

    eventProgress[currentEvent] = prog;

    saveData();

    currentEvent = undefined;

    go("event");
    return;
}
}

function weaponSkill(){
    let p = players[turnIndex];
    let s = p.weapon?.skill;
    if(!s) return;

    if(p.weaponCool > 0) return;

    let atk = p.atk;

if(s.type==="buff"){
    p.atk *= s.power;
}

    if(s.type === "damage"){
        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;
        setTimeout(()=>showDamage("enemy", res),10);
    }

    if(s.type === "poison"){
        enemy.poisons ||= [];
        enemy.poisons.push({
            power: s.power,
            turn:3,
            user:p
        });
    }

if(s.type === "rage"){
    let ratio = 1 - (p.currentHp / p.hp); // 減ってるほど強い
    let dmg = Math.floor(atk * (1 + ratio * (s.power - 1) * 3));

    enemy.hp -= dmg;

    renderBattle();

    setTimeout(()=>{
        showDamage("enemy", {
            dmg: dmg,
            type: "ultimate"
        });
    },10);
}

if(s.type==="multi"){

    for(let i=0;i<s.hits;i++){

        let res = calcDamage(p.attr, enemy.attr, atk * s.power);
        enemy.hp -= res.dmg;

        // 🔻ヒットごとにデバフ
        if(!enemy.debuffUsed){
            enemy.atk *= 0.95; // ←ここ調整ポイント
        }

        setTimeout(()=>{
            showDamage("enemy", res);

            if(i === s.hits - 1){
                enemy.debuffUsed = true; // 最後に固定
                renderBattle();
            }

        }, i * 120);
    }
}

if(s.type==="heal"){
players.forEach((t,i)=>{
    let heal = t.hp * s.power;

    t.currentHp += heal;
    if(t.currentHp > t.hp) t.currentHp = t.hp;

    setTimeout(()=>{
        showDamage("p"+i, {
            dmg: heal,
            type: "heal"
        });
    },10);
});}

    p.weaponCool = 3

    renderBattle();
    endTurn();
}

// セッション内で使用済みのコードを管理
const usedSerialCodes = new Set();

function redeemSerial(){
  const code = document.getElementById("serialInput").value.trim().toUpperCase();
  const msg = document.getElementById("serialMsg");

  // 有効なシリアルコード一覧
  const validCodes = {
    "KANPEKI": "all",   // 全キャラ完凸 + 全武器 + 全rewardChar
  };

  if(!validCodes[code]){
    msg.style.color = "#ff4444";
    msg.textContent = "❌ 無効なコードです";
    return;
  }

  if(usedSerialCodes.has(code)){
    msg.style.color = "#ff9800";
    msg.textContent = "⚠️ このコードは既に使用済みです";
    return;
  }

  const effect = validCodes[code];

  if(effect === "all"){
    // ── 1. 全キャラ完凸（通常 + イベント全種 + rewardChar） ──
    const allCharPools = [
      chars,
      eventChars, eventChars2, eventChars3, eventChars4,
      eventChars5, eventChars6, eventChars7, eventChars8,eventChars9,
      rewardChar   // ← イベント報酬キャラも追加
    ];

    let charAdded = 0;
    let charMaxed = 0;

    allCharPools.forEach(pool => {
      if(!pool || !pool.length) return;
      pool.forEach(c => {
        let exist = box.find(b => b.name === c.name);
        const maxD = maxDupe[c.rarity] || 10;
        const atkPerDupe = c.rarity===4 ? 72 : c.rarity===3 ? 24 : c.rarity===2 ? 17 : 12;
        const hpPerDupe  = c.rarity===4 ? 184: c.rarity===3 ? 72 : c.rarity===2 ? 54 : 42;
        if(!exist){
          let baseAtk = 20 + 5 * c.rarity;
          let baseHp  = 100 + 20 * c.rarity;
          box.push({
            ...c,
            dupe: maxD,
            atk: baseAtk + atkPerDupe * maxD,
            hp:  baseHp  + hpPerDupe  * maxD,
            weapon: null
          });
          charAdded++;
        } else if(exist.dupe < maxD){
          let remaining = maxD - exist.dupe;
          exist.dupe = maxD;
          // スキルツリーボーナス倍率を考慮して凸上昇値をスケール
          let bAtkM = 1.0, bHpM = 1.0;
          if(exist.skillTreeData){
            exist.skillTreeData.chosen.forEach(id2 => {
              let ch2 = stNodeMap[id2];
              if(ch2 && ch2.type === "bonus"){
                if(ch2.bonus.atk) bAtkM *= (1 + ch2.bonus.atk);
                if(ch2.bonus.hp)  bHpM  *= (1 + ch2.bonus.hp);
              }
            });
          }
          exist.atk += Math.round(atkPerDupe * remaining * bAtkM);
          exist.hp  += Math.round(hpPerDupe  * remaining * bHpM);
          charMaxed++;
        }
      });
    });

    // ── 2. 全武器をweaponBoxに追加（未所持のもののみ） ──
    let weapAdded = 0;
    weapons.forEach(w => {
      if(!weaponBox.find(x => x.name === w.name)){
        weaponBox.push({...w});
        weapAdded++;
      }
    });

    update();
    saveData();

    // ── 演出 ──
    let rainbow = document.createElement("div");
    rainbow.className = "rainbowFlash";
    document.body.appendChild(rainbow);
    setTimeout(()=>rainbow.remove(), 900);

    let ef = document.createElement("div");
    ef.className = "eventFlash";
    document.body.appendChild(ef);
    setTimeout(()=>ef.remove(), 900);

    usedSerialCodes.add(code);

    msg.style.color = "#ffd700";
    msg.innerHTML =
      `✅ 全データ取得完了！<br>` +
      `<small style="color:#aaa;">` +
      `キャラ新規 ${charAdded}体 / 完凸 ${charMaxed}体<br>` +
      `武器 ${weapAdded}種 追加` +
      `</small>`;
  }
}

function exchangeChar(charIndex){
  const COST = 250;
  if(dupeStone < COST){
    alert('凸塊が足りません（必要: '+COST+'個）');
    return;
  }
  let c = chars[charIndex];
  if(!c) return;

  // 完凸チェック
  let owned = box.find(b=>b.name===c.name);
  if(owned && owned.dupe >= maxDupe[owned.rarity]){
    alert(c.name+' はすでに完凸です。交換できません。');
    return;
  }

  if(!confirm(c.name+' を凸塊'+COST+'個で交換しますか？')){
    return;
  }

  dupeStone -= COST;
  addToBox(c);
  update();
  saveData();
  alert('✅ '+c.name+' をGETしました！');
  renderExchange();
}
