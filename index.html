// 全ノードIDをフラットに引けるマップ
const stNodeMap = {};
skillTreeStages.forEach(st => st.choices.forEach(ch => { stNodeMap[ch.id] = {...ch, stageId: st.id}; }));
const SKILL_TREE_TOTAL_CHOICES = Object.keys(stNodeMap).length; // 18

let stCharIdx = -1;

function openSkillTree(i){
  stCharIdx = i;
  let c = box[i];
  // skillTree: {chosenIds: Set → save as array, skippedIds: Set → save as array}
  if(!c.skillTreeData) c.skillTreeData = {chosen:[], skipped:[]};
  renderSkillTree();
  document.getElementById("skillTreeModal").classList.add("open");
}

function closeSkillTree(){
  document.getElementById("skillTreeModal").classList.remove("open");
}

// ステージが解放済みか(= 前のステージが選択済み or ステージ0)
function isStageUnlocked(c, stageId){
  if(stageId === 0) return true;
  let prevStage = skillTreeStages[stageId - 1];
  return prevStage.choices.some(ch => c.skillTreeData.chosen.includes(ch.id));
}

// ステージが完了済みか(= いずれか1つをchosen)
function isStageDone(c, stageId){
  let stage = skillTreeStages[stageId];
  return stage.choices.some(ch => c.skillTreeData.chosen.includes(ch.id));
}

function getNodeState(c, stageId, choiceId){
  let chosen = c.skillTreeData.chosen;
  let skipped = c.skillTreeData.skipped;
  if(chosen.includes(choiceId)) return "unlocked";
  if(skipped.includes(choiceId)) return "skipped";
  if(!isStageUnlocked(c, stageId)) return "locked";
  if(isStageDone(c, stageId)) return "skipped"; // 同ステージで別を選択済
  let ch = stNodeMap[choiceId];
  if(sp < ch.cost) return "locked_sp";
  return "available";
}

function getNodeDesc(ch){
  if(ch.type === "bonus"){
    return Object.entries(ch.bonus).map(([k,v])=>{
      if(k==="def") return "被ダメ-"+(v*100).toFixed(0)+"%";
      if(k==="healUp") return "回復量+"+(v*100).toFixed(0)+"%";
      return k.toUpperCase()+" +"+(v*100).toFixed(0)+"%";
    }).join(" / ");
  }
  if(ch.type === "skill_up") return ch.desc || "";
  if(ch.type === "passive_add") return (ch.desc||"");
  return "";
}

function renderStNodeHTML(c, stageId, ch){
  let state = getNodeState(c, stageId, ch.id);
  let descHtml = "";
  if(ch.type === "passive_add")
    descHtml = `<span style='color:#ffcc44;font-size:8px;font-weight:bold;'>📖パッシブ追加</span><br>` + getNodeDesc(ch);
  else if(ch.type === "skill_up")
    descHtml = `<span style='color:#88ccff;font-size:8px;'>🔧スキル強化</span><br>` + getNodeDesc(ch);
  else
    descHtml = getNodeDesc(ch);

  let costHtml = state==="unlocked" ? "✅ 選択済"
    : state==="skipped" ? "❌ 非選択"
    : state==="locked"  ? "🔒 ロック"
    : ("💎 SP "+ch.cost);

  let onclick = (state==="available"||state==="locked_sp") ? `onclick="unlockSkillNode(${stCharIdx},${stageId},${ch.id})"` : "";
  return `<div class="stNode ${state}" ${onclick}>
    <div class="stNodeLabel">${ch.icon} ${ch.label}</div>
    <div class="stNodeBonus">${descHtml}</div>
    <div class="stNodeCost">${costHtml}</div>
  </div>`;
}

function renderSkillTree(){
  let c = box[stCharIdx];
  if(!c) return;
  if(!c.skillTreeData) c.skillTreeData = {chosen:[], skipped:[]};

  document.getElementById("stCharImg").src = c.img;
  document.getElementById("stCharName").textContent = c.name;
  document.getElementById("stSpDisplay").textContent = "🌳 SP: " + sp;
  document.getElementById("stMessage").textContent = "";

  let totalChosen = c.skillTreeData.chosen.length;

  // アクティブパッシブ表示
  let addedPassives = getAddedPassives(c);
  let passiveSummary = addedPassives.length > 0
    ? `<div style="font-size:10px;color:#aaffcc;background:#0a1a10;border:1px solid #336633;border-radius:6px;padding:4px 8px;margin:4px 0 6px;text-align:left;">
        🌿 習得パッシブ:<br>${addedPassives.map(p=>p.text).join("<br>")}
       </div>` : "";

  let html = passiveSummary;

  skillTreeStages.forEach((stage, si) => {
    let done = isStageDone(c, stage.id);
    let unlocked = isStageUnlocked(c, stage.id);
    let headerClass = done ? "done" : (unlocked ? "" : "locked");
    let stageLabel = done ? "✅ "+stage.label : (unlocked ? "▶ "+stage.label : "🔒 "+stage.label);
    html += `<div class="stStageHeader ${headerClass}">${stageLabel} ${done?"":"─ 1つ選択"}</div>`;
    html += `<div class="stRow">`;
    stage.choices.forEach(ch => {
      html += renderStNodeHTML(c, stage.id, ch);
    });
    html += `</div>`;
    if(si < skillTreeStages.length-1){
      html += `<div class="stArrow">↓</div>`;
    }
  });

  html += `<div style="font-size:11px;color:#666;margin-top:8px;">習得済: ${totalChosen}/${skillTreeStages.length}ステージ</div>`;

  // リセットボタンにSP表示
  let resetCost = 0;
  c.skillTreeData.chosen.forEach(id => { let ch = stNodeMap[id]; if(ch) resetCost += ch.cost; });
  let resetBtn = document.getElementById("stResetBtn");
  if(resetBtn){
    if(resetCost > 0){
      resetBtn.textContent = "🔄 リセット (SP "+resetCost+"消費)";
      resetBtn.disabled = false;
      resetBtn.style.opacity = "1";
    } else {
      resetBtn.textContent = "🔄 リセット";
      resetBtn.disabled = true;
      resetBtn.style.opacity = "0.4";
    }
  }
  document.getElementById("stTreeArea").innerHTML = html;
}

// ツリー解放済みのpassive_addノードを返す
function getAddedPassives(c){
  let result = [];
  if(!c.skillTreeData) return result;
  c.skillTreeData.chosen.forEach(id => {
    let ch = stNodeMap[id];
    if(ch && ch.type === "passive_add" && ch.passiveData) result.push(ch.passiveData);
  });
  return result;
}

function getAllPassives(p){
  let passives = [];
  if(p.passive) passives.push({ps: p.passive, label: p.name});
  if(p.weaponPassive) passives.push({ps: p.weaponPassive, label: p.weapon?.name || "武器"});
  let c = box.find(b=>b.name===p.name);
  if(c) getAddedPassives(c).forEach(tp => passives.push({ps: tp, label: p.name+"(ツリー)"}));
  return passives;
}

function unlockSkillNode(charIdx, stageId, choiceId){
  let c = box[charIdx];
  if(!c) return;
  if(!c.skillTreeData) c.skillTreeData = {chosen:[], skipped:[]};

  let ch = stNodeMap[choiceId];
  let msg = document.getElementById("stMessage");

  if(c.skillTreeData.chosen.includes(choiceId)){
    msg.style.color="#aaa"; msg.textContent="すでに選択済みです"; return;
  }
  if(c.skillTreeData.skipped.includes(choiceId)){
    msg.style.color="#ff4444"; msg.textContent="⚠ このノードは非選択になっています"; return;
  }
  if(!isStageUnlocked(c, stageId)){
    msg.style.color="#ff4444"; msg.textContent="⚠ 前のステージを先に解放してください"; return;
  }
  if(isStageDone(c, stageId)){
    msg.style.color="#ff4444"; msg.textContent="⚠ このステージはすでに選択済みです"; return;
  }
  if(sp < ch.cost){
    msg.style.color="#ff4444"; msg.textContent="⚠ SPが足りません（必要: "+ch.cost+" / 現在: "+sp+"）"; return;
  }

  sp -= ch.cost;
  c.skillTreeData.chosen.push(choiceId);

  // 同ステージの他を skipped に
  let stage = skillTreeStages[stageId];
  stage.choices.forEach(other => {
    if(other.id !== choiceId && !c.skillTreeData.skipped.includes(other.id)){
      c.skillTreeData.skipped.push(other.id);
    }
  });

  // ボーナス適用
  let detail = [];
  if(ch.type === "bonus"){
    let atkGain=0, hpGain=0;
    if(ch.bonus.atk){ atkGain=Math.floor(c.atk*ch.bonus.atk); c.atk+=atkGain; }
    if(ch.bonus.hp) { hpGain =Math.floor(c.hp *ch.bonus.hp ); c.hp +=hpGain;  }
    if(ch.bonus.def){ if(!c.treeDef)c.treeDef=0; c.treeDef+=ch.bonus.def; detail.push("被ダメ-"+(ch.bonus.def*100).toFixed(0)+"%"); }
    if(ch.bonus.healUp){ if(!c.treeHealUp)c.treeHealUp=0; c.treeHealUp+=ch.bonus.healUp; detail.push("回復+"+(ch.bonus.healUp*100).toFixed(0)+"%"); }
    if(atkGain>0) detail.push("ATK +"+atkGain);
    if(hpGain>0)  detail.push("HP +"+hpGain);
  } else if(ch.type === "skill_up"){
    if(ch.skillBonus?.ctReduce){
      if(!c.treeCtReduce)c.treeCtReduce=0; c.treeCtReduce+=ch.skillBonus.ctReduce;
      if(c.skill&&c.skill.cool) c.skill.cool=Math.max(1,c.skill.cool-ch.skillBonus.ctReduce);
      detail.push("CT-"+ch.skillBonus.ctReduce);
    }
    if(ch.skillBonus?.powerUp){
      if(!c.treeSkillPower)c.treeSkillPower=0; c.treeSkillPower+=ch.skillBonus.powerUp;
      detail.push("スキル威力+"+(ch.skillBonus.powerUp*100).toFixed(0)+"%");
    }
  } else if(ch.type === "passive_add"){
    detail.push("パッシブ追加: "+ch.passiveData.text);
  }

  msg.style.color="#88ffaa";
  msg.textContent="✅ "+ch.label+" 選択！ "+detail.join(" / ");

  saveData(); update(); renderSkillTree();
}

function resetSkillTree(){
  let c = box[stCharIdx];
  if(!c || !c.skillTreeData) return;
  let chosen = c.skillTreeData.chosen;
  if(chosen.length === 0){
    let msg = document.getElementById("stMessage");
    msg.style.color="#aaa"; msg.textContent="リセットするノードがありません"; return;
  }

  // 消費SP合計を計算
  let totalCost = 0;
  chosen.forEach(id => { let ch = stNodeMap[id]; if(ch) totalCost += ch.cost; });

  if(sp < totalCost){
    let msg = document.getElementById("stMessage");
    msg.style.color="#ff4444"; msg.textContent="⚠ SPが足りません（必要: "+totalCost+" / 現在: "+sp+"）"; return;
  }

  if(!confirm("スキルツリーをリセットします。\n消費SP: "+totalCost+"\n（解放に使ったSP分が必要です）\n\nよろしいですか？")) return;

  // ボーナス逆適用
  chosen.forEach(id => {
    let ch = stNodeMap[id];
    if(!ch) return;
    if(ch.type === "bonus"){
      if(ch.bonus.atk){ c.atk = Math.round(c.atk / (1 + ch.bonus.atk)); }
      if(ch.bonus.hp) { c.hp  = Math.round(c.hp  / (1 + ch.bonus.hp));  }
      if(ch.bonus.def && c.treeDef){ c.treeDef -= ch.bonus.def; if(c.treeDef<=0) delete c.treeDef; }
      if(ch.bonus.healUp && c.treeHealUp){ c.treeHealUp -= ch.bonus.healUp; if(c.treeHealUp<=0) delete c.treeHealUp; }
    } else if(ch.type === "skill_up"){
      if(ch.skillBonus?.powerUp && c.treeSkillPower){ c.treeSkillPower -= ch.skillBonus.powerUp; if(c.treeSkillPower<=0) delete c.treeSkillPower; }
    }
    // passive_add は skillTreeData をクリアすれば自動的に外れる
  });

  sp -= totalCost;
  c.skillTreeData = {chosen:[], skipped:[]};

  let msg = document.getElementById("stMessage");
  msg.style.color="#88ffaa"; msg.textContent="🔄 リセット完了！ SP -"+totalCost;

  saveData(); update(); renderSkillTree();
}

function triggerTreePassiveOnAttack(p){
  let c = box.find(b=>b.name===p.name);
  if(!c) return;
  getAddedPassives(c).forEach(ps => {
    // 💢 闘魂
    if(ps.type==="battle_spirit"){
      if(!p.battleSpiritStacks) p.battleSpiritStacks=0;
      let maxStacks=Math.round(0.50/ps.value);
      if(p.battleSpiritStacks<maxStacks){
        p.battleSpiritStacks++;
        if(!p.buffs) p.buffs=[];
        p.buffs=p.buffs.filter(b=>!b.isBattleSpirit);
        p.buffs.push({power:1+p.battleSpiritStacks*ps.value,turn:999999,permanent:true,isBattleSpirit:true});
        showSynergyText("💢 闘魂！ATK+"+(p.battleSpiritStacks*Math.round(ps.value*100))+"% ("+p.battleSpiritStacks+"/"+maxStacks+")");
      }
    }
    // ⚡ 神速の刃: 25%で追撃
    if(ps.type==="godspeed" && Math.random()<ps.value){
      let extraDmg=Math.floor(p.atk*ps.value);
      if(p.buffs) p.buffs.forEach(b=>{extraDmg=Math.floor(extraDmg*b.power);});
      let res=calcDamage(p.attr,enemy.attr,extraDmg);
      enemy.hp-=res.dmg;
      setTimeout(()=>{
        showDamage("enemy",{...res});
        showSynergyText("⚡ 神速の刃！追撃 "+res.dmg+"ダメージ！");
      },300);
    }
    // ✨ 魂の共鳴: 攻撃後に味方全体バフ付与
    if(ps.type==="soul_resonance"){
      players.forEach(t=>{
        if(!t.buffs) t.buffs=[];
        let existing=t.buffs.filter(b=>b.isSoulResonance);
        if(existing.length<3){
          t.buffs.push({power:1+ps.value,turn:3,isSoulResonance:true});
          let pi2=players.indexOf(t);
          setTimeout(()=>showDamage("p"+pi2,{dmg:0,type:"heal"}),50+pi2*40);
        }
      });
      showSynergyText("✨ 魂の共鳴！全体ATK+"+Math.round(ps.value*100)+"%バフ付与！");
    }
  });
}

function applyTreePassiveAtk(p){
  let bonus=1.0;
  let c=box.find(b=>b.name===p.name);
  if(!c) return bonus;
  getAddedPassives(c).forEach(ps=>{
    if(ps.type==="attr_resonance" && enemy && p.attr===enemy.attr) bonus*=(1+ps.value);
    if(ps.type==="undying_will" && (p.currentHp/p.hp)<=ps.threshold) bonus*=(1+ps.value);
    if(ps.type==="doom_passive" && enemy && (enemy.hp/(enemy.maxHp||enemy.hp))<=ps.threshold) bonus*=(1+ps.value);
    if(ps.type==="conqueror" && enemy && (enemy.hp/(enemy.maxHp||enemy.hp))<=ps.threshold) bonus*=(1+ps.value);
  });
  // treeSkillPower はスキルダメージのみ対象のためここでは適用しない
  return bonus;
}

function applyTreePassiveDef(p){
  let reduction=1.0;
  let c=box.find(b=>b.name===p.name);
  if(!c) return reduction;
  if(c.treeDef) reduction*=(1-c.treeDef);
  getAddedPassives(c).forEach(ps=>{
    if(ps.type==="undying_will" && (p.currentHp/p.hp)<=ps.threshold) reduction*=0.80;
    if(ps.type==="undying_guard") reduction*=0.90;
  });
  return reduction;
}

// 被ダメ時: 反撃の炎パッシブ
function triggerTreePassiveOnDamaged(p){
  let c=box.find(b=>b.name===p.name);
  if(!c) return;
  getAddedPassives(c).forEach(ps=>{
    if(ps.type==="counter_passive" && Math.random()<ps.chance){
      let counterDmg=Math.floor(p.atk*ps.value);
      if(p.buffs) p.buffs.forEach(b=>{counterDmg=Math.floor(counterDmg*b.power);});
      let res=calcDamage(p.attr,enemy.attr,counterDmg);
      enemy.hp-=res.dmg;
      let pIdx=players.indexOf(p);
      setTimeout(()=>{
        showDamage("enemy",{...res,type:"weak"});
        showSynergyText("🔥 反撃の炎！"+res.dmg+"ダメージ！");
      },200);
    }
  });
}

// ターン開始時: 生命力パッシブ
function triggerTreePassiveOnTurnStart(){
  players.forEach((p,pi)=>{
    let c=box.find(b=>b.name===p.name);
    if(!c) return;
    getAddedPassives(c).forEach(ps=>{
      if(ps.type==="regen_passive"){
        let healAmt=Math.floor(p.hp*ps.value);
        p.currentHp=Math.min(p.hp,p.currentHp+healAmt);
        setTimeout(()=>showDamage("p"+pi,{dmg:healAmt,type:"heal"}),pi*60);
      }
      if(ps.type==="undying_guard"){
        let healAmt=Math.floor(p.hp*ps.value);
        p.currentHp=Math.min(p.hp,p.currentHp+healAmt);
        setTimeout(()=>{showDamage("p"+pi,{dmg:healAmt,type:"heal"}); showSynergyText("🌙 不死の加護！HP+"+healAmt+"回復！");},pi*60+30);
      }
    });
  });
}

function getAilmentTreeBonus(){
  let mult=1.0;
  players.forEach(pl=>{
    let c2=box.find(b=>b.name===pl.name);
    if(!c2) return;
    getAddedPassives(c2).forEach(ps=>{
      if(ps.type==="ailment_power_up") mult*=(1+ps.value);
    });
  });
  return mult;
}
